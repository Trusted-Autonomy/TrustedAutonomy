# Gemma 4 12B — mid-size local model with strong coding and reasoning.
# Best for: complex tasks, multi-file refactors, most software development work.
# Hardware: 16 GB VRAM (discrete) / 24 GB unified memory (Apple Silicon)
# Install: ta agent install gemma4

name        = "gemma4-12b"
version     = "1.0.0"
description = "Gemma 4 12B via Ollama — balanced local agent, ~10 GB VRAM"
command     = "ta-agent-ollama"
args        = ["--model", "gemma4:12b", "--base-url", "http://localhost:11434", "--max-turns", "50", "--temperature", "0.1"]
sentinel    = "[goal started]"
context_file = "CLAUDE.md"
context_inject = "env"

[memory]
inject       = "env"
max_entries  = 15
recency_days = 7

[hardware]
min_vram_gb    = 16
min_unified_gb = 24
min_ram_gb     = 24
target         = "M1 Pro/Max (24 GB), RTX 4080 (16 GB), RTX 5080"
