# TA Channel Configuration Template
#
# Copy this to .ta/config.yaml in your project root and customize.
# The WebhookChannel acts as a universal bridge — any external service
# (Discord, Slack, Gmail, Teams, etc.) can read/write the exchange
# directory to participate in the review flow.
#
# See docs/guides/ for platform-specific setup guides.

channels:
  # --- Review Channel ---
  # Where draft reviews are sent for human approval.
  # Options: terminal (default), webhook, auto-approve
  review:
    type: webhook
    endpoint: .ta/channel-exchange    # directory for request/response JSON files
    timeout_seconds: 3600             # max wait time (1 hour)
    poll_interval_ms: 2000            # how often TA checks for responses

  # --- Notification Channels ---
  # Where status updates are sent. Supports multiple targets.
  notify:
    - type: webhook
      endpoint: .ta/channel-exchange
      level: warning                  # minimum level: info, warning, error

  # --- Session Channel ---
  # Interactive sessions (ta dev, ta run --interactive).
  # Usually stays as terminal since you need real-time I/O.
  session:
    type: terminal

  # --- Escalation Channel ---
  # Where policy violations and drift alerts go.
  # Optional — defaults to the review channel if not set.
  # escalation:
  #   type: webhook
  #   endpoint: .ta/channel-exchange

  # --- Default Agent ---
  default_agent: claude-code


# ── Example: Discord-only setup ─────────────────────────────────
# channels:
#   review:
#     type: webhook
#     endpoint: .ta/channel-exchange
#     timeout_seconds: 3600
#   notify:
#     - type: webhook
#       endpoint: .ta/channel-exchange
#   session:
#     type: terminal
#   default_agent: claude-code
#
# Then run: node .ta/bridges/discord/bridge.js

# ── Example: Slack with Socket Mode ─────────────────────────────
# channels:
#   review:
#     type: webhook
#     endpoint: .ta/channel-exchange
#     timeout_seconds: 3600
#   notify:
#     - type: webhook
#       endpoint: .ta/channel-exchange
#   session:
#     type: terminal
#   default_agent: claude-code
#
# Then run: node .ta/bridges/slack/bridge.js

# ── Example: Gmail (higher timeout for email latency) ───────────
# channels:
#   review:
#     type: webhook
#     endpoint: .ta/channel-exchange
#     timeout_seconds: 7200          # 2 hours — email is slower
#     poll_interval_ms: 5000
#   notify:
#     - type: webhook
#       endpoint: .ta/channel-exchange
#   session:
#     type: terminal
#   default_agent: claude-code
#
# Then run: node .ta/bridges/gmail/bridge.js

