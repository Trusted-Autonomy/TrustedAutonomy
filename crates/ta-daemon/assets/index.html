<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6c8cff">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" href="/icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Trusted Autonomy — Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2d3148;
    --text: #e1e4ed; --muted: #8b8fa3; --accent: #6c8cff;
    --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }
  .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border);
          overflow-x: auto; }
  .tab { padding: 0.6rem 1.25rem; cursor: pointer; color: var(--muted); font-size: 0.9rem;
         font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.15s;
         white-space: nowrap; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .subtabs { display: flex; gap: 0.4rem; margin: -1rem 0 1.25rem; flex-wrap: wrap; }
  .subtab { padding: 0.3rem 0.75rem; cursor: pointer; color: var(--muted); font-size: 0.8rem;
            font-weight: 500; border-radius: 999px; border: 1px solid var(--border);
            transition: all 0.15s; white-space: nowrap; }
  .subtab:hover { color: var(--text); border-color: var(--muted); }
  .subtab.active { color: var(--accent); border-color: var(--accent); background: var(--surface); }
  .card { background: var(--surface); border: 1px solid var(--border);
          border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem;
          transition: border-color 0.15s; }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { border-color: var(--accent); }
  .card-header { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
  .card-title { font-weight: 600; font-size: 1.05rem; }
  .badge { padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600;
           white-space: nowrap; }
  .badge-draft { background: var(--yellow); color: #000; }
  .badge-pending { background: var(--accent); color: #fff; }
  .badge-approved { background: var(--green); color: #000; }
  .badge-denied { background: var(--red); color: #fff; }
  .badge-cat { background: var(--border); color: var(--text); font-size: 0.7rem; }
  .badge-active { background: #2563eb; color: #fff; }
  .badge-question { background: var(--yellow); color: #000; }
  .card-meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.5rem; }
  .detail { background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 1.5rem; }
  .back { color: var(--accent); cursor: pointer; font-size: 0.9rem;
          margin-bottom: 1rem; display: inline-block; }
  .back:hover { text-decoration: underline; }
  .actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; flex-wrap: wrap; }
  .btn { padding: 0.5rem 1.25rem; border: none; border-radius: 6px; font-size: 0.9rem;
         font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-approve { background: var(--green); color: #000; }
  .btn-deny { background: var(--red); color: #fff; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.8rem; }
  .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .section { margin-top: 1.25rem; }
  .section h3 { font-size: 0.95rem; color: var(--muted); margin-bottom: 0.5rem;
                text-transform: uppercase; letter-spacing: 0.05em; }
  .artifact { background: var(--bg); border: 1px solid var(--border);
              border-radius: 6px; padding: 0.75rem; margin-bottom: 0.5rem;
              font-family: 'SF Mono', Monaco, monospace; font-size: 0.85rem; }
  .artifact-uri { color: var(--accent); }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  .loading { text-align: center; padding: 3rem; color: var(--muted); }
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
        padding: 1rem; overflow-x: auto; font-size: 0.85rem; margin-top: 0.5rem; }
  .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .search-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border);
                      border-radius: 6px; padding: 0.5rem 0.75rem; color: var(--text);
                      font-size: 0.9rem; }
  .search-bar input::placeholder { color: var(--muted); }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
               gap: 0.75rem; margin-bottom: 1.25rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border);
               border-radius: 8px; padding: 1rem; text-align: center; }
  .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }
  .tag { display: inline-block; background: var(--border); border-radius: 4px;
         padding: 0.1rem 0.4rem; font-size: 0.7rem; margin-right: 0.25rem; }
  .confidence-bar { display: inline-block; width: 60px; height: 6px; background: var(--border);
                    border-radius: 3px; vertical-align: middle; margin-left: 0.5rem; }
  .confidence-fill { height: 100%; border-radius: 3px; background: var(--green); }
  /* Form styles */
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.35rem; }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.5rem 0.75rem; color: var(--text); font-size: 0.9rem;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { outline: none; border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  /* Answer panel */
  .question-card { border-left: 3px solid var(--yellow); }
  .answer-input { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
  .answer-input input { flex: 1; background: var(--bg); border: 1px solid var(--border);
                        border-radius: 6px; padding: 0.5rem 0.75rem; color: var(--text);
                        font-size: 0.9rem; }
  .answer-input input:focus { outline: none; border-color: var(--accent); }
  /* Dashboard sections */
  .dash-section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em;
                        color: var(--muted); margin-bottom: 0.6rem; padding-bottom: 0.3rem;
                        border-bottom: 1px solid var(--border); }
  .dash-section { margin-bottom: 1.5rem; }
  /* Template grid */
  .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                   gap: 0.75rem; margin-top: 0.75rem; }
  .template-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
                   padding: 0.9rem; cursor: pointer; transition: border-color 0.15s; }
  .template-tile:hover, .template-tile.selected { border-color: var(--accent); }
  .template-tile.selected { background: #1e2235; }
  .template-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
  .template-desc { font-size: 0.75rem; color: var(--muted); }
  /* Advisor Menu (v0.15.26) — option-card styling shared with the Advisor tab (renderAdvisorOptions) */
  .advisor-options { display: flex; flex-direction: column; gap: 0.5rem; }
  .advisor-option { display: flex; align-items: center; gap: 0.75rem; background: var(--bg);
                    border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem 0.9rem;
                    cursor: pointer; transition: border-color 0.15s; }
  .advisor-option:hover { border-color: var(--accent); }
  .advisor-option .opt-num { background: var(--accent); color: #fff; border-radius: 50%;
                              width: 1.4rem; height: 1.4rem; display: flex; align-items: center;
                              justify-content: center; font-size: 0.75rem; font-weight: 700;
                              flex-shrink: 0; }
  .advisor-option .opt-label { flex: 1; font-size: 0.9rem; }
  .advisor-option .opt-cmd { font-size: 0.75rem; color: var(--muted); font-family: monospace; }
  .advisor-option.opt-apply .opt-num { background: var(--green); }
  .advisor-option.opt-deny .opt-num { background: var(--red); }
  .advisor-option.opt-auto .opt-num { background: var(--yellow); color: #000; }
  /* Sub-phase nesting (v0.16.1.1) */
  .subphase-list { margin-top: 0.75rem; border-left: 2px solid var(--border); padding-left: 1rem; }
  .subphase-item-done { display: flex; align-items: center; gap: 0.5rem; padding: 0.2rem 0;
                        font-size: 0.82rem; color: var(--muted); }
  .subphase-item-done .sub-check { color: var(--green); flex-shrink: 0; }
  .subphase-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
                   padding: 0.75rem 1rem; margin-top: 0.5rem; }
  .subphase-card.active { border-color: var(--accent); }
  .subphase-header { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
  .subphase-id { color: var(--muted); font-family: monospace; font-size: 0.75rem; flex-shrink: 0; }
  .subphase-title { font-size: 0.88rem; font-weight: 600;
                    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chevron { cursor: pointer; color: var(--muted); font-size: 0.8rem; padding: 0 0.25rem;
             transition: transform 0.15s; flex-shrink: 0; }
  /* Advisor tab chat panel */
  .advisor-chat { display: flex; flex-direction: column; gap: 0.75rem; }
  .advisor-msg { padding: 0.75rem; border-radius: 8px; font-size: 0.9rem; line-height: 1.5; }
  .advisor-msg.user { background: #1e2235; border: 1px solid var(--border); align-self: flex-end;
                       max-width: 80%; }
  .advisor-msg.advisor { background: var(--surface); border: 1px solid var(--accent);
                          max-width: 90%; }
  .advisor-input-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  .advisor-input-row input { flex: 1; background: var(--bg); border: 1px solid var(--border);
                             border-radius: 6px; padding: 0.5rem 0.75rem; color: var(--text);
                             font-size: 0.9rem; }
  .advisor-input-row input:focus { outline: none; border-color: var(--accent); }
  /* Advise panel (v0.15.28) */
  .advise-panel { background: var(--surface); border: 1px solid var(--border);
                  border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.75rem;
                  display: flex; flex-direction: column; gap: 0.5rem; }
  .advise-panel-header { display: flex; justify-content: space-between; align-items: center; }
  .advise-panel-title { font-size: 0.8rem; font-weight: 600; color: var(--muted);
                        text-transform: uppercase; letter-spacing: 0.05em; }
  .advise-panel-meta { font-size: 0.75rem; color: var(--muted); }
  .advise-input-row { display: flex; gap: 0.5rem; align-items: center; }
  .advise-input-row input { flex: 1; background: var(--bg); border: 1px solid var(--border);
                             border-radius: 6px; padding: 0.45rem 0.7rem; color: var(--text);
                             font-size: 0.9rem; }
  .advise-input-row input:focus { outline: none; border-color: var(--accent); }
  .advise-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px;
                  font-size: 0.7rem; font-weight: 600; white-space: nowrap; }
  .advise-badge-live { background: var(--green); color: #000; }
  .advise-badge-queued { background: var(--border); color: var(--text); }
  .advise-result { font-size: 0.8rem; padding: 0.35rem 0.6rem; border-radius: 4px;
                   border: 1px solid var(--border); color: var(--text); }
  .advise-result.ok { border-color: var(--green); color: var(--green); }
  .advise-result.err { border-color: var(--red); color: var(--red); }
  /* Native modal dialog (v0.16.1.2) */
  dialog { background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
           padding: 1.5rem; max-width: 480px; width: 92%; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  dialog::backdrop { background: rgba(0,0,0,0.65); }
  dialog p { margin-bottom: 0.75rem; line-height: 1.5; }
  .dialog-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
  /* pr_ready badge */
  .badge-pr-ready { background: var(--yellow); color: #000; }
  /* Collapsible draft sections */
  details summary { cursor: pointer; user-select: none; font-size: 0.95rem; color: var(--muted);
                    text-transform: uppercase; letter-spacing: 0.05em; padding: 0.3rem 0;
                    list-style: none; display: flex; align-items: center; gap: 0.4rem; }
  details summary::before { content: '▶'; font-size: 0.65rem; transition: transform 0.15s; }
  details[open] summary::before { transform: rotate(90deg); }
  details summary::-webkit-details-marker { display: none; }
  details .detail-body { margin-top: 0.5rem; }
  /* Version badge in header */
  #version-badge { font-size: 0.72rem; color: var(--muted); font-family: monospace;
                   cursor: pointer; padding: 0.1rem 0.4rem; border: 1px solid var(--border);
                   border-radius: 4px; margin-left: 0.5rem; }
  #version-badge:hover { color: var(--accent); border-color: var(--accent); }
  /* Health Alert Bar (v0.15.30.6) */
  .health-bar { display: flex; align-items: center; gap: 0.75rem; border-radius: 6px;
               padding: 0.5rem 0.75rem; margin-bottom: 0.75rem; font-size: 0.85rem;
               border: 1px solid; }
  .health-bar.warn { background: rgba(251,191,36,0.08); border-color: var(--yellow); color: var(--yellow); }
  .health-bar.crit { background: rgba(248,113,113,0.12); border-color: var(--red); color: var(--red); }
  .health-bar .hb-msg { flex: 1; }
  .health-bar .hb-action { font-size: 0.75rem; color: var(--muted); font-family: monospace; }
  .health-bar .hb-dismiss { cursor: pointer; font-size: 0.8rem; color: var(--muted); padding: 0 0.25rem; }
  .health-bar .hb-dismiss:hover { color: var(--text); }
  .health-bar-expand { font-size: 0.75rem; cursor: pointer; color: var(--muted); }
  .health-bar-expand:hover { color: var(--accent); }
  .health-cleanup-btn { background: var(--yellow); color: #000; border: none; border-radius: 4px;
                        padding: 0.3rem 0.7rem; font-size: 0.78rem; font-weight: 600;
                        cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .health-cleanup-btn:hover { opacity: 0.85; }
  .health-log { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
               padding: 0.75rem; font-family: monospace; font-size: 0.8rem; white-space: pre-wrap;
               max-height: 200px; overflow-y: auto; margin-top: 0.5rem; }
  /* Notification bell + panel (v0.16.1.3) */
  .notif-bell { background: none; border: 1px solid var(--border); border-radius: 6px;
                padding: 0.3rem 0.6rem; cursor: pointer; font-size: 1rem; color: var(--muted);
                transition: all 0.15s; position: relative; }
  .notif-bell:hover { color: var(--accent); border-color: var(--accent); }
  .notif-count { position: absolute; top: -4px; right: -4px; background: var(--red); color: #fff;
                 border-radius: 50%; width: 16px; height: 16px; font-size: 0.6rem; font-weight: 700;
                 display: flex !important; align-items: center; justify-content: center; }
  .notif-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
                 padding: 1rem; margin-bottom: 0.75rem; max-height: 320px; overflow-y: auto; }
  .notif-panel-header { display: flex; justify-content: space-between; align-items: center;
                        margin-bottom: 0.75rem; }
  .notif-item { padding: 0.6rem 0.75rem; border-radius: 6px; margin-bottom: 0.4rem; font-size: 0.85rem;
                border-left: 3px solid var(--border); }
  .notif-item.info { border-left-color: var(--accent); }
  .notif-item.warning { border-left-color: var(--yellow); }
  .notif-item.critical { border-left-color: var(--red); background: rgba(248,113,113,0.06); }
  .notif-item-summary { font-weight: 500; }
  .notif-item-action { font-size: 0.75rem; color: var(--muted); font-family: monospace; margin-top: 0.15rem; }
  .notif-item-time { font-size: 0.7rem; color: var(--muted); margin-top: 0.25rem; }
  /* Context-sensitive suggestion chips (v0.16.1.3) */
  .advisor-suggestions { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; }
  .suggestion-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
                     padding: 0.2rem 0.75rem; font-size: 0.78rem; cursor: pointer; color: var(--muted);
                     transition: all 0.15s; white-space: nowrap; }
  .suggestion-chip:hover { border-color: var(--accent); color: var(--accent); }
  /* Project health panel (v0.16.1.3) */
  .health-stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
                      gap: 0.6rem; margin-bottom: 1rem; }
  .health-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
                 padding: 0.75rem; text-align: center; }
  .health-stat-val { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .health-stat-lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-top: 0.15rem; }
  /* Cross-project links panel (v0.16.1.5) */
  .link-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
               padding: 0.85rem 1rem; display: flex; flex-direction: column; gap: 0.35rem;
               transition: border-color 0.15s; cursor: pointer; }
  .link-card:hover { border-color: var(--accent); }
  .link-card-header { display: flex; align-items: center; gap: 0.5rem; }
  .link-card-name { font-weight: 600; font-size: 0.9rem; flex: 1; }
  .link-rel-badge { font-size: 0.7rem; padding: 0.1rem 0.45rem; border-radius: 10px;
                    background: rgba(99,102,241,0.15); color: var(--accent); font-weight: 600; }
  .link-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .link-status-dot.ok { background: var(--green); }
  .link-status-dot.missing { background: var(--red); }
  .link-status-dot.stale { background: var(--yellow); }
  .link-status-dot.unreachable { background: var(--muted); }
  .link-excerpt { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }
  .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
               gap: 0.6rem; margin-top: 0.5rem; }
  /* Manifest modal */
  .link-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55);
                         z-index: 200; display: flex; align-items: center; justify-content: center; }
  .link-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
                padding: 1.5rem; max-width: 680px; width: 90%; max-height: 80vh;
                overflow-y: auto; position: relative; }
  .link-modal-close { position: absolute; top: 0.75rem; right: 0.75rem; cursor: pointer;
                       font-size: 1.2rem; color: var(--muted); background: none; border: none; }
  .link-modal pre { white-space: pre-wrap; font-size: 0.82rem; color: var(--text);
                    font-family: monospace; background: var(--bg); border-radius: 6px;
                    padding: 0.75rem; border: 1px solid var(--border); }
  /* Running goal expandable detail (v0.16.1.3) */
  .goal-detail { margin-top: 0.75rem; border-top: 1px solid var(--border); padding-top: 0.75rem;
                 font-size: 0.85rem; }
  .goal-log { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
              padding: 0.6rem; font-family: monospace; font-size: 0.78rem; white-space: pre-wrap;
              max-height: 150px; overflow-y: auto; margin-top: 0.4rem; color: var(--muted); }
  /* Workflow template catalog (v0.16.1.3) */
  .wf-template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                      gap: 0.75rem; margin-top: 0.75rem; }
  .wf-template-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
                      padding: 1rem; transition: border-color 0.15s; }
  .wf-template-card:hover { border-color: var(--accent); }
  .wf-template-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
  .wf-template-desc { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.6rem; }
</style>
</head>
<body>
<div class="container">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;margin-bottom:0.1rem">
    <div style="display:flex;align-items:baseline;gap:0.5rem">
      <h1>Trusted Autonomy</h1>
      <span id="version-badge" onclick="switchTab('plan')" title="Click to open Plan tab"></span>
    </div>
    <button id="notif-bell" class="notif-bell" onclick="toggleNotifPanel()" title="Notifications">
      &#128276;<span id="notif-count" class="notif-count" style="display:none"></span>
    </button>
  </div>
  <!-- Notification slide-in panel (v0.16.1.3) -->
  <div id="notif-panel" class="notif-panel" style="display:none"></div>
  <p class="subtitle" id="subtitle">Loading...</p>
  <!-- Advise Panel (v0.15.28): Cmd+Shift+K to focus, sends notes to active goal agent -->
  <div class="advise-panel" id="advise-panel">
    <div class="advise-panel-header">
      <span class="advise-panel-title">Advise Active Goal</span>
      <span class="advise-panel-meta" id="advise-goal-meta">Loading...</span>
    </div>
    <div class="advise-input-row">
      <input type="text" id="advise-input" placeholder="Send a note to the running agent… (⌘⇧K)"
             onkeydown="adviseInputKeydown(event)">

    </div>
    <div id="advise-result" style="display:none" class="advise-result"></div>

  <!-- Health Alert Bar (v0.15.30.6): ambient signals banner -->

    <div class="link-modal" id="link-modal-content">
      <button class="link-modal-close" onclick="closeLinkModal()">&#10005;</button>
      <div id="link-modal-body"></div>
    </div>
  </div>
  <!-- Studio IA (v0.17.0.12.17): the prior 15 flat tabs mapped one-to-one
       onto backend structs, not onto what a user is actually trying to do.
       Collapsed to the 4 real destinations from
       docs/design/ta-concepts-and-architecture.md §6/§7: Attention (things
       that need you now), Activity (everything going on — drill-in via the
       sub-nav below), Configuration (who/what does the work), Advisor (the
       conversational entry point). Legacy tab keys ('dashboard', 'drafts',
       'health', ...) still work via switchTab()'s LEGACY_TAB_MAP so internal
       callers didn't all need rewriting — see switchTab() below. -->
  <div class="tabs">
    <div class="tab active" data-tab="attention" onclick="switchTab('attention')" id="tab-attention">Attention</div>
    <div class="tab" data-tab="activity" onclick="switchTab('activity')">Activity</div>
    <div class="tab" data-tab="configuration" onclick="switchTab('configuration')">Configuration</div>
    <div class="tab" data-tab="advisor" onclick="switchTab('advisor')">Advisor</div>

    <div class="dialog-actions" id="ta-dialog-actions"></div>

  <!-- Setup Wizard Overlay -->

    <div style="max-width:620px;margin:3rem auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;">
      <div id="wizard-content"></div>
    </div>
  </div>
</div>
<script>
const app = document.getElementById('app');
// currentTab holds a compound "destination:section" key for the two
// multi-section destinations (e.g. "activity:plan") or a bare destination
// key for the two single-view ones ("attention", "advisor") — see
// switchTab() (v0.17.0.12.17).
let currentTab = 'attention';
let drafts = [];
// Advisor state (v0.15.26)
let advisorHistory = [];
let advisorSecurity = 'read_only';
// Advisor history loaded from API (v0.16.1.3)
let advisorHistoryLoaded = false;
// Notification feed state (v0.16.1.3)
let notifPanelOpen = false;
let seenNotifIds = new Set(JSON.parse(sessionStorage.getItem('ta_seen_notifs') || '[]'));

// ── Notification Feed (v0.16.1.3) ─────────────────────────────

async function pollNotifications() {
  try {
    const resp = await fetch('/api/notifications');
    if (!resp.ok) return;
    const data = await resp.json();
    const all = data.notifications || [];
    const urgent = all.filter(n => n.severity !== 'info');
    // Update bell badge.
    const countEl = document.getElementById('notif-count');
    const bellEl = document.getElementById('notif-bell');
    if (countEl) {
      const unseen = all.filter(n => !seenNotifIds.has(n.id));
      if (unseen.length > 0) {
        countEl.textContent = unseen.length > 9 ? '9+' : String(unseen.length);
        countEl.style.display = 'flex';
        if (bellEl) bellEl.title = `${unseen.length} notification${unseen.length !== 1 ? 's' : ''}`;
      } else {
        countEl.style.display = 'none';
      }
    }
    // Re-render panel if open.
    if (notifPanelOpen) renderNotifPanel(all);
  } catch (_) {}
}

function toggleNotifPanel() {
  notifPanelOpen = !notifPanelOpen;
  const panel = document.getElementById('notif-panel');
  if (!panel) return;
  if (notifPanelOpen) {
    panel.style.display = 'block';
    loadNotifPanel();
  } else {
    panel.style.display = 'none';
  }
}

async function loadNotifPanel() {
  try {
    const resp = await fetch('/api/notifications');
    const data = resp.ok ? await resp.json() : { notifications: [] };
    renderNotifPanel(data.notifications || []);
    // Mark all as seen.
    (data.notifications || []).forEach(n => seenNotifIds.add(n.id));
    sessionStorage.setItem('ta_seen_notifs', JSON.stringify([...seenNotifIds]));
    const countEl = document.getElementById('notif-count');
    if (countEl) countEl.style.display = 'none';
  } catch (e) {
    const panel = document.getElementById('notif-panel');
    if (panel) panel.innerHTML = '<div class="notif-panel-header"><span>Notifications</span></div><div style="color:var(--muted);font-size:0.85rem">Could not load notifications.</div>';
  }
}

function renderNotifPanel(notifications) {
  const panel = document.getElementById('notif-panel');
  if (!panel) return;
  const items = notifications.length === 0
    ? '<div style="color:var(--muted);font-size:0.85rem;padding:0.5rem 0">No notifications.</div>'
    : notifications.slice(0, 20).map(n => {
        const sev = (n.severity || 'info').toLowerCase();
        const color = sev === 'critical' ? 'var(--red)' : sev === 'warning' ? 'var(--yellow)' : 'var(--accent)';
        const linkHtml = n.entity_id
          ? `<span style="font-size:0.72rem;color:${color};cursor:pointer" onclick="closeNotifAndNavigate('${esc(n.entity_id)}','${esc(n.notification_type)}')">View →</span>`
          : '';
        const timeHtml = n.generated_at
          ? `<div class="notif-item-time" title="${esc(new Date(n.generated_at).toLocaleString())}">${esc(formatNotifTime(n.generated_at))}</div>`
          : '';
        return `<div class="notif-item ${esc(sev)}" style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="notif-item-summary">${esc(n.summary)}</div>
            <div class="notif-item-action">${esc(n.suggested_action)}</div>
            ${timeHtml}
          </div>
          ${linkHtml}
        </div>`;
      }).join('');
  panel.innerHTML = `<div class="notif-panel-header">
    <span style="font-weight:600;font-size:0.9rem">Notifications</span>
    <button class="btn btn-ghost btn-sm" onclick="toggleNotifPanel()">Close</button>
  </div>${items}`;
}

function closeNotifAndNavigate(entityId, notifType) {
  notifPanelOpen = false;
  const panel = document.getElementById('notif-panel');
  if (panel) panel.style.display = 'none';
  if (notifType === 'draft_ready') {
    switchTab('drafts');
  } else if (notifType.startsWith('goal_')) {
    switchTab('dashboard');
  } else {
    switchTab('health');
  }
}

// Poll notifications every 60s.
setInterval(pollNotifications, 60000);

// ── Utilities ─────────────────────────────────────────────────
function esc(s) {
  if (s === null || s === undefined) return '';
  const el = document.createElement('span');
  el.textContent = String(s);
  return el.innerHTML;
}

function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const mins = Math.floor((now - d) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

// Absolute timestamp for notifications, e.g. "Jun 29 14:32" (v0.17.0.12.5).
function formatNotifTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const month = d.toLocaleString(undefined, { month: 'short' });
  const day = d.getDate();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${month} ${day} ${hh}:${mm}`;
}

function badgeClass(status) {
  const s = draftStatus({status}).toLowerCase();
  if (s.includes('approved')) return 'badge-approved';
  if (s.includes('denied')) return 'badge-denied';
  if (s.includes('pending')) return 'badge-pending';
  if (s.includes('applied')) return 'badge-approved';
  return 'badge-draft';
}

// DraftStatus serializes two different ways depending on the endpoint: the
// list endpoint Debug-formats it to a PascalCase string ("PendingReview"),
// while the detail endpoint's Rust-side #[serde(tag = "status", rename_all =
// "snake_case")] produces an internally-tagged object whose nested `status`
// is real snake_case ("pending_review"). Both are normalized to the same
// lowercase, no-separator key here (e.g. "pendingreview") so every caller —
// isReviewable/isApproved checks, badgeClass(), humanizeStatus() — compares
// against one consistent shape instead of each needing its own normalization
// (a prior version of this function returned the object form verbatim,
// un-normalized, which silently made isReviewable's 'pendingreview' check
// never match a real draft loaded from the detail endpoint (v0.17.0.12.17
// item 6 — the same raw-enum-leak class of bug, just affecting behavior
// instead of just display text)).
function draftStatus(d) {
  const raw = d && d.status;
  if (!raw) return 'unknown';
  const tag = typeof raw === 'string' ? raw
    : (typeof raw === 'object' && typeof raw.status === 'string') ? raw.status
    : null;
  return tag ? tag.toLowerCase().replace(/_/g, '') : 'unknown';
}

// Plain-language labels for DraftStatus (v0.17.0.12.17 item 6): draftStatus()
// above returns the raw lowercased enum tag (e.g. "pendingreview", with no
// word boundary — a literal leak of the Rust enum variant name into the UI).
// This maps every known tag to copy a reviewer would actually recognize.
const STATUS_LABELS = {
  draft: 'Proposed Change',
  pendingreview: 'Pending Review',
  underreview: 'Under Review',
  approved: 'Approved',
  denied: 'Denied',
  applied: 'Applied',
  superseded: 'Superseded',
  closed: 'Closed',
  unknown: 'Unknown',
};
function humanizeStatus(status) {
  // draftStatus() returns two different raw shapes depending on the
  // endpoint: the list endpoint's Debug-formatted string lowercases to
  // "pendingreview" (no separator), while the detail endpoint's internally-
  // tagged object gives the serde tag verbatim, "pending_review" (with
  // underscore, already lowercase). Normalize away case AND underscores
  // before the lookup so both land on the same STATUS_LABELS key — this is
  // exactly the raw-enum-leak bug item 6 called out, just in its object form.
  const key = (status || '').toLowerCase().replace(/_/g, '');
  return STATUS_LABELS[key] || (status ? status.charAt(0).toUpperCase() + status.slice(1) : 'Unknown');
}

// ── Modal dialogs (v0.16.1.2) ─────────────────────────────────
// Replace browser alert/confirm/prompt with in-page <dialog> modals.

function _getDialog() { return document.getElementById('ta-dialog'); }

function showAlert(msg) {
  const dlg = _getDialog();
  if (!dlg) { return; }
  document.getElementById('ta-dialog-body').textContent = String(msg);
  const actions = document.getElementById('ta-dialog-actions');
  actions.innerHTML = '';
  const ok = document.createElement('button');
  ok.className = 'btn btn-primary btn-sm';
  ok.textContent = 'OK';
  ok.onclick = () => dlg.close();
  actions.appendChild(ok);
  dlg.showModal();
}

function showConfirm(msg, onConfirm, onCancel) {
  const dlg = _getDialog();
  if (!dlg) { if (window._nativeConfirm(msg)) onConfirm && onConfirm(); else onCancel && onCancel(); return; }
  document.getElementById('ta-dialog-body').textContent = String(msg);
  const actions = document.getElementById('ta-dialog-actions');
  actions.innerHTML = '';
  const cancel = document.createElement('button');
  cancel.className = 'btn btn-ghost btn-sm';
  cancel.textContent = 'Cancel';
  cancel.onclick = () => { dlg.close(); if (onCancel) onCancel(); };
  const confirm = document.createElement('button');
  confirm.className = 'btn btn-primary btn-sm';
  confirm.textContent = 'Confirm';
  confirm.onclick = () => { dlg.close(); if (onConfirm) onConfirm(); };
  actions.appendChild(cancel);
  actions.appendChild(confirm);
  dlg.showModal();
}

function showPrompt(msg, defaultVal, onResult) {
  const dlg = _getDialog();
  if (!dlg) {
    const v = window._nativePrompt(String(msg), String(defaultVal || ''));
    onResult && onResult(v);
    return;
  }
  const body = document.getElementById('ta-dialog-body');
  body.innerHTML = `<p>${esc(msg)}</p><input id="ta-dlg-inp" type="text" value="${esc(defaultVal||'')}" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:0.4rem 0.6rem;color:var(--text);font-size:0.9rem">`;
  const actions = document.getElementById('ta-dialog-actions');
  actions.innerHTML = '';
  let _confirmed = false;
  const cancel = document.createElement('button');
  cancel.className = 'btn btn-ghost btn-sm';
  cancel.textContent = 'Cancel';
  cancel.onclick = () => dlg.close();
  const ok = document.createElement('button');
  ok.className = 'btn btn-primary btn-sm';
  ok.textContent = 'OK';
  ok.onclick = () => { _confirmed = true; dlg.close(); };
  actions.appendChild(cancel);
  actions.appendChild(ok);
  dlg.onclose = () => {
    const val = _confirmed ? (document.getElementById('ta-dlg-inp')?.value ?? '') : null;
    dlg.onclose = null;
    if (onResult) onResult(val);
  };
  const inp = body.querySelector('input');
  if (inp) inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { _confirmed = true; dlg.close(); }
    if (e.key === 'Escape') dlg.close();
  });
  dlg.showModal();
  setTimeout(() => { const i = body.querySelector('input'); if (i) { i.focus(); i.select(); } }, 30);
}

// Preserve native implementations for fallback, then override globals.
window._nativeConfirm = window.confirm.bind(window);
window._nativePrompt  = window.prompt.bind(window);
window.alert   = (msg) => showAlert(String(msg || ''));

// ── Targeted DOM updates (v0.17.0.12.6 item 1) ─────────────────
// Studio previously replaced the entire `#app` container's innerHTML on
// every poll tick, which reset scroll position, blurred focused inputs, and
// collapsed open <details> elements. `setAppContent()` is a drop-in
// replacement for `app.innerHTML = html` that diffs the new markup against
// the live DOM and only touches nodes that actually changed. The very first
// render into an empty/placeholder `#app` still ends up replacing
// everything (there's nothing worth preserving yet); subsequent poll-driven
// re-renders of the same page patch in place.
function setAppContent(html) {
  if (!app.firstChild) {
    app.innerHTML = html;
    return;
  }
  const scratch = document.createElement('div');
  scratch.innerHTML = html;
  morphChildren(app, scratch);
}

function morphChildren(oldParent, newParent) {
  const oldNodes = Array.from(oldParent.childNodes);
  const newNodes = Array.from(newParent.childNodes);
  const max = Math.max(oldNodes.length, newNodes.length);
  for (let i = 0; i < max; i++) {
    const oldNode = oldParent.childNodes[i];
    const newNode = newNodes[i];
    if (!newNode) {
      if (oldNode) oldParent.removeChild(oldNode);
      continue;
    }
    if (!oldNode) {
      oldParent.appendChild(newNode.cloneNode(true));
      continue;
    }
    // Sections in dashboard/list renders come and go based on data (e.g. the
    // "Running Goals" block disappears once nothing is running), which shifts
    // every following sibling's index. Matching by tag name alone then morphs
    // unrelated elements into each other — observed as the Advisor chat log
    // losing its scrollable layout when it got attribute-stomped by whatever
    // sibling happened to land at its old index. Treat differing `id`s as a
    // hard identity mismatch so id-bearing nodes are replaced instead of
    // silently reinterpreted as a different section.
    const oldId = oldNode.nodeType === Node.ELEMENT_NODE ? oldNode.id : '';
    const newId = newNode.nodeType === Node.ELEMENT_NODE ? newNode.id : '';
    const typeMismatch = oldNode.nodeType !== newNode.nodeType ||
      (oldNode.nodeType === Node.ELEMENT_NODE && oldNode.tagName !== newNode.tagName) ||
      oldId !== newId;
    if (typeMismatch) {
      oldParent.replaceChild(newNode.cloneNode(true), oldNode);
      continue;
    }
    if (oldNode.nodeType === Node.TEXT_NODE || oldNode.nodeType === Node.COMMENT_NODE) {
      if (oldNode.textContent !== newNode.textContent) oldNode.textContent = newNode.textContent;
      continue;
    }
    if (oldNode.nodeType === Node.ELEMENT_NODE) {
      morphAttributes(oldNode, newNode);
      // Leave the user's live edits alone — don't diff into a focused input's subtree.
      if (document.activeElement === oldNode && (oldNode.tagName === 'INPUT' || oldNode.tagName === 'TEXTAREA')) {
        continue;
      }
      morphChildren(oldNode, newNode);
    }
  }
}

function morphAttributes(oldEl, newEl) {
  const isLiveInput = (oldEl.tagName === 'INPUT' || oldEl.tagName === 'TEXTAREA') && document.activeElement === oldEl;
  for (let i = oldEl.attributes.length - 1; i >= 0; i--) {
    const name = oldEl.attributes[i].name;
    if (!newEl.hasAttribute(name)) oldEl.removeAttribute(name);
  }
  for (const attr of newEl.attributes) {
    if (isLiveInput && attr.name === 'value') continue;
    if (oldEl.getAttribute(attr.name) !== attr.value) oldEl.setAttribute(attr.name, attr.value);
  }
  // Value/checked are live DOM properties, not reflected reliably via attributes.
  if (!isLiveInput && 'value' in newEl && oldEl.value !== newEl.value) oldEl.value = newEl.value;
  if ('checked' in newEl && oldEl.checked !== newEl.checked) oldEl.checked = newEl.checked;
}

// ── Tab navigation (v0.17.0.12.17: 4-destination IA) ─────────────
// The prior 15 flat tabs mapped one struct to one tab (§6 of
// docs/design/ta-concepts-and-architecture.md). Collapsed to 4 real
// destinations: Attention (single view — merges what used to be Active,
// Agent Questions, and the pending subset of Review Drafts, see
// loadAttentionQueue()), Activity (multi-section — everything going on),
// Configuration (multi-section — who/what does the work), Advisor
// (single view, unchanged). LEGACY_TAB_MAP resolves the pre-redesign
// per-concept tab keys so the many existing switchTab('dashboard')-style
// call sites elsewhere in this file keep working unchanged.
const ACTIVITY_SECTIONS = [
  { key: 'overview', label: 'Overview', load: loadDashboard },
  { key: 'plan', label: 'Plan', load: loadPlan },
  { key: 'drafts', label: 'Proposed Changes', load: loadDrafts },
  { key: 'workflows', label: 'Workflows', load: loadWorkflows },
  { key: 'release', label: 'Release', load: loadRelease },
  { key: 'memory', label: 'Memory', load: loadMemory },
  { key: 'projects', label: 'Projects', load: loadProjects },
  { key: 'stats', label: 'Stats', load: loadStatsTab },
  { key: 'health', label: 'Health', load: loadHealthPage },
];
const CONFIGURATION_SECTIONS = [
  { key: 'team', label: 'Team & Roles', load: loadTeamRoles },
  { key: 'agents', label: 'Agents', load: loadAgents },
  { key: 'personas', label: 'Personas', load: loadPersonas },
  { key: 'settings', label: 'Settings', load: loadSettings },
];
const LEGACY_TAB_MAP = {
  dashboard: 'activity:overview',
  active: 'attention',
  plan: 'activity:plan',
  drafts: 'activity:drafts',
  questions: 'attention',
  memory: 'activity:memory',
  projects: 'activity:projects',
  workflows: 'activity:workflows',
  release: 'activity:release',
  agents: 'configuration:agents',
  personas: 'configuration:personas',
  advisor: 'advisor',
  stats: 'activity:stats',
  health: 'activity:health',
  settings: 'configuration:settings',
  attention: 'attention',
  activity: 'activity:overview',
  configuration: 'configuration:team',
};

// Reverse of LEGACY_TAB_MAP's section granularity: server-side AdvisorContext
// matching (see ta-session's `AdvisorContext.tab`) still expects the old flat
// keys (e.g. "workflows", "plan"), not the new compound "dest:section" form.
function legacyTabKey(compound) {
  const [dest, section] = compound.split(':');
  if (dest === 'attention') return 'dashboard';
  if (dest === 'activity') return section === 'overview' ? 'dashboard' : section;
  if (dest === 'configuration') return section === 'team' ? 'agents' : section;
  return dest;
}

function switchTab(tab) {
  const resolved = LEGACY_TAB_MAP[tab] || tab;
  currentTab = resolved;
  const [dest, section] = resolved.split(':');

  // Match by the explicit data-tab attribute rather than the tab's visible
  // text — labels don't always match their tab key and can change at
  // runtime (e.g. "Attention (3)" once something needs review), which
  // previously left the active-tab highlight stuck on the wrong tab.
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === dest);
  });
  renderSubnav(dest, section);

  if (dest === 'attention') loadAttentionQueue();
  else if (dest === 'advisor') loadAdvisor();
  else if (dest === 'activity') {
    const found = ACTIVITY_SECTIONS.find(s => s.key === section) || ACTIVITY_SECTIONS[0];
    found.load();
    if (found.key === 'overview') startDashRefresh();
  } else if (dest === 'configuration') {
    const found = CONFIGURATION_SECTIONS.find(s => s.key === section) || CONFIGURATION_SECTIONS[0];
    found.load();
  }
}

// Renders the pill sub-nav for Activity/Configuration; hidden for the two
// single-view destinations (Attention, Advisor).
function renderSubnav(dest, section) {
  const subnav = document.getElementById('subnav');
  if (!subnav) return;
  const sections = dest === 'activity' ? ACTIVITY_SECTIONS
    : dest === 'configuration' ? CONFIGURATION_SECTIONS
    : null;
  if (!sections) {
    subnav.style.display = 'none';
    subnav.innerHTML = '';
    return;
  }
  subnav.style.display = 'flex';
  subnav.innerHTML = sections.map(s => `
    <div class="subtab ${s.key === section ? 'active' : ''}" onclick="switchTab('${dest}:${s.key}')">${esc(s.label)}</div>
  `).join('');
}

// Jump straight to a specific draft's detail view without going through
// switchTab('activity:drafts') first, which kicks off loadDrafts() — a
// fetch of the full drafts *list* that, if slower than the detail's own
// fetches (plausible with many drafts), can resolve after the detail view
// renders and silently replace it with the list, making the "Why"/AI Safety
// Review sections look like they vanished.
function viewDraftDetail(id) {
  currentTab = 'activity:drafts';
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === 'activity');
  });
  renderSubnav('activity', 'drafts');
  showDraftDetail(id);
}

// ── Advise Panel (v0.15.28) ───────────────────────────────────
// Cmd+Shift+K focuses the advise panel input from anywhere in the UI.
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k' && e.shiftKey) {
    e.preventDefault();
    const adviseInput = document.getElementById('advise-input');
    if (adviseInput) { adviseInput.focus(); adviseInput.select(); }
  }
});
// Shows above the tab bar. Sends a mid-run note to the active goal's agent.

let adviseActiveGoalId = null;
let adviseActiveAgentId = null;

async function loadAdvisePanel() {
  const metaEl = document.getElementById('advise-goal-meta');
  if (!metaEl) return;
  try {
    const resp = await fetch('/api/status');
    if (resp.ok) {
      const status = await resp.json();
      // Try to pick up the most recent running goal id from status.
      // The status endpoint may return a running_goal_id field.
      if (status && status.running_goal_id) {
        adviseActiveGoalId = status.running_goal_id;
        adviseActiveAgentId = status.running_agent_id || null;
      } else {
        adviseActiveGoalId = null;
        adviseActiveAgentId = null;
      }
    }
  } catch(_) {
    adviseActiveGoalId = null;
    adviseActiveAgentId = null;
  }

  if (adviseActiveGoalId) {
    const shortId = adviseActiveGoalId.substring(0, 8);
    const channelBadge = channelBadgeHtml(adviseActiveAgentId);
    metaEl.innerHTML = 'Goal: <code style="font-size:0.75rem">' + esc(shortId) + '</code> ' + channelBadge;
  } else {
    metaEl.innerHTML = '<span style="color:var(--muted)">No active goal</span>';
  }
}

function channelBadgeHtml(agentId) {
  const id = (agentId || '').toLowerCase();
  const isLive = id === 'claude-code' || id === 'claude-flow';
  if (isLive) {
    return '<span class="advise-badge advise-badge-live">Live</span>';
  }
  return '<span class="advise-badge advise-badge-queued">Queued</span>';
}

function adviseInputKeydown(e) {
  if (e.key === 'Enter') submitAdviseNote();
  if (e.key === 'Escape') document.getElementById('advise-input').blur();
}

async function submitAdviseNote() {
  const input = document.getElementById('advise-input');
  const resultEl = document.getElementById('advise-result');
  const message = (input ? input.value : '').trim();
  if (!message) return;

  const body = { message };
  if (adviseActiveGoalId) body.goal_id = adviseActiveGoalId;

  if (input) input.value = '';
  if (resultEl) { resultEl.style.display = 'none'; resultEl.className = 'advise-result'; }

  try {
    const resp = await fetch('/api/advisor/inject', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = resp.ok ? await resp.json() : null;
    if (resultEl) {
      resultEl.style.display = '';
      if (resp.ok && data) {
        const delivery = data.delivery || 'sent';
        const shortGoal = (data.goal_id || '').substring(0, 8);
        resultEl.className = 'advise-result ok';
        resultEl.textContent = 'Delivered (' + delivery + ') to goal ' + shortGoal;
        // Refresh panel meta to pick up any goal state change.
        loadAdvisePanel();
      } else {
        resultEl.className = 'advise-result err';
        const errMsg = data ? (data.error || 'Unknown error') : ('HTTP ' + resp.status);
        resultEl.textContent = 'Error: ' + errMsg;
      }
    }
  } catch(e) {
    if (resultEl) {
      resultEl.style.display = '';
      resultEl.className = 'advise-result err';
      resultEl.textContent = 'Network error: ' + e.message;
    }
  }
}

// ── Advisor option cards (v0.15.26) ────────────────────────────
// Shared by the Advisor tab's chat log — numbered options are interactive.
function renderAdvisorOptions(options, data) {
  if (!options.length) return '';
  return options.map(opt => {
    const colorClass = opt.action_type === 'apply' ? ' opt-apply'
      : opt.action_type === 'deny' ? ' opt-deny'
      : opt.action_type === 'auto_fire' ? ' opt-auto'
      : '';
    const cmdHtml = opt.command
      ? `<span class="opt-cmd">${esc(opt.command)}</span>`
      : '';
    return `<div class="advisor-option${colorClass}" onclick="handleAdvisorOption(${opt.number}, '${esc(JSON.stringify(opt))}', '${esc(JSON.stringify(data))}')">
      <span class="opt-num">${opt.number}</span>
      <span class="opt-label">${esc(opt.label)}</span>
      ${cmdHtml}
    </div>`;
  }).join('');
}

async function handleAdvisorOption(num, optJson, dataJson) {
  const opt = JSON.parse(optJson);
  const data = JSON.parse(dataJson);

  switch (opt.action_type) {
    case 'apply':
      await applyLatestDraft();
      break;
    case 'deny':
      await denyLatestDraft();
      break;
    case 'auto_fire':
    case 'button':
      if (opt.command) await fireGoalCommand(opt.command);
      break;
    case 'text':
      // Copy command to clipboard and show confirmation.
      if (opt.command) {
        try { await navigator.clipboard.writeText(opt.command); } catch(_) {}
        showAlert('Copied to clipboard:\n' + opt.command);
      }
      break;
    case 'answer':
      switchTab('advisor');
      break;
    default:
      break;
  }
}

async function applyLatestDraft() {
  try {
    const resp = await fetch('/api/drafts');
    const all = resp.ok ? await resp.json() : [];
    const pending = all.filter(d => d.status === 'PendingReview');
    if (pending.length === 0) { showAlert('No pending drafts to apply.'); return; }
    const latest = pending[0];
    const r = await fetch('/api/drafts/' + latest.package_id + '/apply', { method: 'POST' });
    if (r.ok) { showAlert('Proposed change applied.'); loadDashboard(); }
    else { showAlert('Apply failed: ' + r.status); }
  } catch(e) { showAlert('Network error: ' + e.message); }
}

async function denyLatestDraft() {
  try {
    const resp = await fetch('/api/drafts');
    const all = resp.ok ? await resp.json() : [];
    const pending = all.filter(d => d.status === 'PendingReview');
    if (pending.length === 0) { showAlert('No pending drafts to deny.'); return; }
    const latest = pending[0];
    const r = await fetch('/api/drafts/' + latest.package_id + '/deny', { method: 'POST' });
    if (r.ok) { showAlert('Proposed change denied.'); loadDashboard(); }
    else { showAlert('Deny failed: ' + r.status); }
  } catch(e) { showAlert('Network error: ' + e.message); }
}

async function fireGoalCommand(command) {
  // Extract goal title from `ta run "..."` command.
  const match = command.match(/ta run "([^"]+)"/);
  if (!match) { showAlert('Cannot parse goal command: ' + command); return; }
  const title = match[1];
  try {
    const r = await fetch('/api/goal/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, headless: true })
    });
    if (r.ok) {
      const d = await r.json();
      showAlert('Goal started: ' + (d.goal_id || title));
      switchTab('dashboard');
    } else {
      showAlert('Start goal failed: ' + r.status + '. Run manually:\n' + command);
    }
  } catch(e) { showAlert('Network error. Run manually:\n' + command); }
}

let _advisorSuggestions = [];

async function loadAdvisor() {
  // Load advisor config.
  try {
    const r = await fetch('/api/advisor/config');
    if (r.ok) {
      const cfg = await r.json();
      advisorSecurity = cfg.security || 'read_only';
    }
  } catch(_) {}

  // Load persistent history from API (once per session load).
  if (!advisorHistoryLoaded) {
    try {
      const r = await fetch('/api/advisor/history');
      if (r.ok) {
        const data = await r.json();
        if (data.entries && data.entries.length > 0) {
          advisorHistory = data.entries.map(e => ({
            role: e.role,
            text: e.text,
            options: e.options || [],
          }));
        }
      }
      advisorHistoryLoaded = true;
    } catch(_) {}
  }

  // Load context-sensitive suggestions.
  try {
    const r = await fetch('/api/advisor/suggestions');
    if (r.ok) _advisorSuggestions = await r.json();
  } catch(_) { _advisorSuggestions = []; }

  renderAdvisorTab();
}

function renderAdvisorTab() {
  const securityBadge = advisorSecurity === 'auto'
    ? '<span class="badge badge-active">auto</span>'
    : advisorSecurity === 'suggest'
    ? '<span class="badge badge-pending">suggest</span>'
    : '<span class="badge badge-draft">read-only</span>';

  // Suggestion chips.
  let chipsHtml = '';
  if (_advisorSuggestions.length > 0) {
    chipsHtml = '<div class="advisor-suggestions">' +
      _advisorSuggestions.map(chip =>
        `<div class="suggestion-chip" onclick="useSuggestionChip(${JSON.stringify(chip.id)},${JSON.stringify(chip.action_type)},${JSON.stringify(chip.command||'')})">${esc(chip.text)}</div>`
      ).join('') +
      '</div>';
  }

  let historyHtml = '';
  for (const msg of advisorHistory) {
    if (msg.role === 'user') {
      historyHtml += `<div class="advisor-msg user">${esc(msg.text)}</div>`;
    } else {
      let optHtml = '';
      if (msg.options && msg.options.length) {
        optHtml = '<div class="advisor-options" style="margin-top:0.75rem">' +
          msg.options.map(opt => {
            const colorClass = opt.action_type === 'apply' ? ' opt-apply'
              : opt.action_type === 'deny' ? ' opt-deny'

            const cmdHtml = opt.command ? `<span class="opt-cmd">${esc(opt.command)}</span>` : '';

              <span class="opt-num">${opt.number}</span>

          }).join('') + '</div>';

    }

  const emptyHint = advisorHistory.length === 0
    ? '<div class="empty" style="padding:2rem">Send a message to the advisor using the bar above (⌘K), or type below.<br><span style="font-size:0.8rem;color:var(--muted)">Try: "What should I work on next?" or "Check system health"</span></div>'

function useSuggestionChip(id, actionType, command) {
  if (actionType === 'switch_tab' && command) {
    switchTab(command);

async function submitAdvisorTab() {
  const input = document.getElementById('advisor-tab-input');
  const message = (input ? input.value : '').trim();
  if (!message) return;
  if (input) input.value = '';

  const now = new Date().toISOString();
  const userEntry = { role: 'user', text: message, options: [], timestamp: now };
  advisorHistory.push(userEntry);
  renderAdvisorTab();

  // For check_status / question intents, augment with live context.
  let advisorContext = null;
  try {
    const ctxResp = await fetch('/api/advisor/context');
    if (ctxResp.ok) advisorContext = await ctxResp.json();
  } catch(_) {}

  const context = { tab: legacyTabKey(currentTab), selection: null };
  try {
    const resp = await fetch('/api/advisor/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, context })
    });
    const data = resp.ok ? await resp.json() : { response: 'Error contacting advisor.', options: [], intent: 'clarify' };

    // For question/check_status intents, enrich response with live context.
    let enrichedResponse = data.response;
    if (advisorContext && (data.intent === 'question' || data.intent === 'check_status')) {
      enrichedResponse = buildContextAwareResponse(data.response, advisorContext, message);
    }

    const advisorEntry = { role: 'advisor', text: enrichedResponse, options: data.options || [], timestamp: new Date().toISOString() };
    advisorHistory.push(advisorEntry);
    renderAdvisorTab();

    // Persist to API (best-effort).
    persistAdvisorHistory([userEntry, advisorEntry]);
  } catch(e) {
    const errEntry = { role: 'advisor', text: 'Network error: ' + e.message, options: [], timestamp: new Date().toISOString() };
    advisorHistory.push(errEntry);
    renderAdvisorTab();
  }
}

function buildContextAwareResponse(baseResponse, ctx, message) {
  const lc = message.toLowerCase();
  let extra = '';

  if (ctx.active_goals && ctx.active_goals.length > 0) {
    const goal = ctx.active_goals.find(g =>
      lc.includes(g.title.toLowerCase().substring(0, 20)) ||
      lc.includes(g.goal_id.substring(0, 8)) ||
      lc.includes('running') || lc.includes('current') || lc.includes('progress')
    );
    if (goal) {
      const elapsed = goal.elapsed_secs;
      const elStr = elapsed < 60 ? elapsed + 's' : elapsed < 3600 ? Math.floor(elapsed/60) + 'm' : Math.floor(elapsed/3600) + 'h';
      extra += `\n\nActive goal: "${goal.title}" (${elStr} elapsed${goal.phase ? ', phase ' + goal.phase : ''}).`;
    } else if (lc.includes('goal') || lc.includes('running') || lc.includes('status')) {
      extra += `\n\n${ctx.active_goals.length} goal${ctx.active_goals.length !== 1 ? 's' : ''} currently running: ` +
        ctx.active_goals.map(g => '"' + g.title + '"').join(', ') + '.';
    }
  }

  if ((lc.includes('draft') || lc.includes('review') || lc.includes('pending')) && ctx.pending_drafts > 0) {
    extra += `\n\n${ctx.pending_drafts} draft${ctx.pending_drafts !== 1 ? 's' : ''} waiting for review in the Drafts tab.`;
  }

  if ((lc.includes('plan') || lc.includes('phase') || lc.includes('progress')) && ctx.plan_pending_count !== undefined) {
    const done = ctx.plan_done_count || 0;
    const total = done + (ctx.plan_pending_count || 0);
    if (total > 0) {
      extra += `\n\nPlan: ${done}/${total} phases complete (${Math.round((done/total)*100)}%).`;
    }
  }

  if ((lc.includes('health') || lc.includes('system') || lc.includes('signal')) && ctx.health_signals_count > 0) {
    extra += `\n\n${ctx.health_signals_count} health signal${ctx.health_signals_count !== 1 ? 's' : ''} detected — check the Health tab for details.`;
  }

  return baseResponse + extra;
}

// ── Dashboard ─────────────────────────────────────────────────
async function loadDashboard() {

    app.innerHTML = '<div class="loading">Loading dashboard...</div>';
  }
  try {
    const [draftsResp, questionsResp, statusResp, planResp, velocityResp, advisorCtxResp, linksResp, dialogResp] = await Promise.allSettled([
      fetch('/api/drafts'),
      fetch('/api/interactions/pending'),
      fetch('/api/status'),
      fetch('/api/plan/phases'),
      fetch('/api/stats/velocity'),
      fetch('/api/advisor/context'),
      fetch('/api/links'),
      fetch('/api/advisor/dialog'),
    ]);

    const draftsData = draftsResp.status === 'fulfilled' && draftsResp.value.ok
      ? await draftsResp.value.json().catch(() => [])
      : [];
    const questions = questionsResp.status === 'fulfilled' && questionsResp.value.ok
      ? await questionsResp.value.json().catch(() => [])
      : [];
    const status = statusResp.status === 'fulfilled' && statusResp.value.ok
      ? await statusResp.value.json().catch(() => null)
      : null;
    const phases = planResp.status === 'fulfilled' && planResp.value.ok
      ? await planResp.value.json().catch(() => [])
      : [];
    const velocity = velocityResp.status === 'fulfilled' && velocityResp.value.ok
      ? await velocityResp.value.json().catch(() => null)
      : null;
    const advisorCtx = advisorCtxResp.status === 'fulfilled' && advisorCtxResp.value.ok
      ? await advisorCtxResp.value.json().catch(() => null)
      : null;
    window._taLinks = linksResp.status === 'fulfilled' && linksResp.value.ok
      ? await linksResp.value.json().catch(() => [])
      : [];
    const dialogEntries = dialogResp.status === 'fulfilled' && dialogResp.value.ok
      ? (await dialogResp.value.json().catch(() => ({ entries: [] }))).entries || []
      : [];

    // Update subtitle with timestamp.
    document.getElementById('subtitle').textContent =
      'Review Dashboard — updated ' + new Date().toLocaleTimeString();

    // Highlight the Attention tab (item 1: it now owns Agent Questions +
    // Ready-to-Review, so its badge count reflects both).
    updateAttentionBadge(questions.length, draftsData.filter(d => d.status === 'PendingReview').length);

    // A slow fetch above may have lost the race against the user clicking to
    // another tab — bail before touching #app so we don't stomp whatever
    // that tab has since rendered (root cause of tab switches getting stuck
    // showing Dashboard content for up to ~60s after load).
    if (currentTab !== 'activity:overview') return;

    // Redirect to Projects tab if no active project is set (v0.14.18).
    if (status && status.active_project_path === null) {
      switchTab('projects');
      return;
    }

    renderDashboard(draftsData, questions, status, phases, velocity, advisorCtx, dialogEntries);
  } catch (e) {

      app.innerHTML = '<div class="empty">Failed to load dashboard. Is the daemon running?</div>';
    }
  }
}

// Reliability-fallback refresh for Dashboard (item 2): SSE is the primary
// update mechanism (see startDashEventStream below). This long-interval
// timer only exists to self-heal if a browser can't do SSE at all, or if
// events were somehow missed — it is not the primary refresh path anymore.
let _dashRefreshTimer = null;
function startDashRefresh() {
  if (_dashRefreshTimer) clearInterval(_dashRefreshTimer);
  _dashRefreshTimer = setInterval(() => { if (currentTab === 'activity:overview') loadDashboard(); }, 90000);
}

// Dashboard immediacy (v0.17.0.12.5 item 4, broadened in v0.17.0.12.9 item 2):
// subscribe to the daemon's SSE event stream so dashboard-relevant state
// changes (goal lifecycle, draft lifecycle, agent questions, plan phase
// completion) appear within the stream's ~2s server-side poll tick, instead
// of relying on a fixed-interval poll regardless of whether anything changed.
const DASH_SSE_EVENT_TYPES = [
  'goal_started', 'goal_completed', 'goal_failed',
  'draft_built', 'draft_submitted', 'draft_approved', 'draft_denied', 'draft_applied',
  'agent_needs_input', 'agent_question_answered',
  'plan_phase_completed', 'review_requested',
];
let _dashEventSource = null;
function startDashEventStream() {
  if (_dashEventSource) return;
  try {
    _dashEventSource = new EventSource('/api/events?types=' + DASH_SSE_EVENT_TYPES.join(','));
  } catch (e) {
    return; // EventSource unsupported/unavailable — the fallback timer still covers us.
  }
  const refreshIfOnDashboard = () => { if (currentTab === 'activity:overview') loadDashboard(); };
  for (const type of DASH_SSE_EVENT_TYPES) {
    _dashEventSource.addEventListener(type, refreshIfOnDashboard);
  }
  // On reconnect (network blip, daemon restart), the browser resumes the
  // stream automatically per the EventSource spec, but any events emitted
  // during the gap were missed. Refresh once per reconnect to close that
  // gap rather than waiting for the 90s fallback timer.
  let everOpened = false;
  _dashEventSource.onopen = () => {
    if (everOpened) refreshIfOnDashboard();
    everOpened = true;
  };
}

function renderDashboard(allDrafts, questions, status, phases, velocity, advisorCtx, dialogEntries) {
  const pending = allDrafts.filter(d => d.status === 'PendingReview');
  const active = allDrafts.filter(d => d.status === 'Draft');
  const runningAgents = status && status.active_agents ? status.active_agents.filter(a => a.state === 'running' || a.state === 'configured') : [];

  let html = '';

  // ── Project Health Panel (v0.16.1.3) ──────────────────────────
  const donePhases = phases.filter(p => p.status === 'done').length;
  const pendingPhases = phases.filter(p => p.status === 'pending' || p.status === 'in_progress').length;
  const totalPhases = phases.length;
  const completionPct = totalPhases > 0 ? Math.round((donePhases / totalPhases) * 100) : 0;
  // /api/stats/velocity nests the aggregate under `.aggregate` (it also
  // returns by_contributor/phase_conflicts/local_only_count alongside it).
  const goalsPerWeek = velocity && velocity.aggregate ? (velocity.aggregate.goals_per_week || 0).toFixed(1) : '—';
  const healthSignals = (advisorCtx && advisorCtx.health_signals_count > 0)
    ? `<span style="color:var(--yellow)">${advisorCtx.health_signals_count} signal${advisorCtx.health_signals_count !== 1 ? 's' : ''}</span>`
    : `<span style="color:var(--green)">Healthy</span>`;

  html += '<div class="dash-section">';
  html += '<div class="dash-section-title">Project Health</div>';
  html += '<div class="health-stat-grid">';
  html += `<div class="health-stat"><div class="health-stat-val">${completionPct}%</div><div class="health-stat-lbl">Plan Complete</div></div>`;
  html += `<div class="health-stat"><div class="health-stat-val">${goalsPerWeek}</div><div class="health-stat-lbl">Goals/Week</div></div>`;
  html += `<div class="health-stat"><div class="health-stat-val">${pending.length}</div><div class="health-stat-lbl">Needs Review</div></div>`;
  html += `<div class="health-stat" style="cursor:pointer" onclick="switchTab('health')"><div class="health-stat-val" style="font-size:1rem;padding-top:0.3rem">${healthSignals}</div><div class="health-stat-lbl">System Health</div></div>`;
  html += '</div>';
  html += '</div>';

  // ── Linked Projects panel (v0.16.1.5) ─────────────────────────
  if (window._taLinks && window._taLinks.length > 0) {
    html += '<div class="dash-section">';
    html += '<div class="dash-section-title">Linked Projects</div>';
    html += '<div class="link-grid">';
    for (const lnk of window._taLinks) {
      const dotClass = lnk.status === 'ok' ? (lnk.cached ? 'stale' : 'ok') : lnk.status === 'unreachable' ? 'unreachable' : 'missing';
      const excerpt = lnk.manifest_excerpt ? `<div class="link-excerpt">${esc(lnk.manifest_excerpt)}</div>` : '';
      html += `<div class="link-card" onclick="showLinkModal(${JSON.stringify(lnk)})">
        <div class="link-card-header">
          <span class="link-status-dot ${dotClass}" title="${esc(lnk.status)}"></span>
          <span class="link-card-name">${esc(lnk.name)}</span>
          <span class="link-rel-badge">${esc(lnk.relationship)}</span>
        </div>
        ${excerpt}
      </div>`;
    }
    html += '</div>';
    html += '</div>';
  }

  // Running goals, in-progress/ready-to-review drafts, and agent questions
  // all now live solely in the Attention destination (item 1) — this
  // Overview section previously duplicated all three as its own cards,
  // fetching the same endpoints Attention already renders. See
  // loadAttentionQueue() / renderAttentionQueue().

  // Summary stats.
  html += '<div class="stat-grid">';
  html += `<div class="stat-card"><div class="stat-value">${runningAgents.length}</div><div class="stat-label">Active Agents</div></div>`;
  html += `<div class="stat-card"><div class="stat-value">${active.length}</div><div class="stat-label">In Progress</div></div>`;
  html += `<div class="stat-card"><div class="stat-value">${questions.length}</div><div class="stat-label">Waiting for You</div></div>`;
  const total = allDrafts.length;
  html += `<div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Drafts</div></div>`;
  html += '</div>';

  // ── Advisor quick-dialog (v0.17.0.12.6 item 4) ─────────────────
  // Sits below the Project Health stat boxes as a fast entry point for
  // queueing work without leaving Overview. Shares the same unified
  // .ta/advisor-history.jsonl conversation as the full Advisor destination
  // (v0.17.0.12.17 item 2 — these were two independently-persisted
  // histories before the merge).
  html += renderDashAdvisorDialog(dialogEntries || []);

  if (runningAgents.length === 0 && active.length === 0 && pending.length === 0 && questions.length === 0) {
    html += '<div class="empty">Everything is up to date. Start a new goal from the <strong>Plan</strong> section, or check <strong>Attention</strong>.</div>';
  }

  html += '<div style="margin-top:1rem;font-size:0.8rem;color:var(--muted);text-align:right">' +
    '<button class="btn btn-sm btn-ghost" onclick="loadDashboard()">Refresh</button>' +
    ' <span style="margin-left:0.5rem">Live-updates on activity</span></div>';

  setAppContent(html);
}

// ── Dashboard Advisor dialog (v0.17.0.12.6 item 4) ─────────────

function renderDashAdvisorMsg(entry) {
  if (entry.role === 'user') {
    return `<div class="advisor-msg user">${esc(entry.text)}</div>`;
  }
  let extra = '';
  if (entry.confirmation_card) {
    const c = entry.confirmation_card;
    extra = `<div class="advisor-options" style="margin-top:0.5rem">
      <div class="advisor-option opt-auto" style="cursor:default">
        <span class="opt-num">?</span>
        <span class="opt-label">${esc(c.title)}${c.phase ? ' &middot; phase ' + esc(c.phase) : ''} &middot; ~${c.estimated_duration_mins}m</span>
      </div>
      <div style="display:flex;gap:0.5rem;margin-top:0.25rem">
        <button class="btn btn-sm btn-primary" onclick="approveDashAdvisorGoal(${JSON.stringify(c.title)}, ${JSON.stringify(c.phase || null)})">Approve</button>
        <button class="btn btn-sm btn-ghost" onclick="editDashAdvisorGoal(${JSON.stringify(c.title)})">Edit</button>
        <button class="btn btn-sm btn-ghost" onclick="this.closest('.advisor-msg').style.display='none'">Cancel</button>
      </div>
    </div>`;
  } else if (entry.options && entry.options.length > 0) {
    extra = '<div class="advisor-options" style="margin-top:0.5rem">' + entry.options.map((o, i) => `
      <div class="advisor-option" onclick="document.getElementById('dash-advisor-input').value=${JSON.stringify(o)};submitDashAdvisorDialog()">
        <span class="opt-num">${i + 1}</span>
        <span class="opt-label">${esc(o)}</span>
      </div>`).join('') + '</div>';
  }
  return `<div class="advisor-msg advisor">${esc(entry.text)}${extra}</div>`;
}

function renderDashAdvisorDialog(entries) {
  const historyHtml = entries.map(renderDashAdvisorMsg).join('');
  const emptyHint = entries.length === 0
    ? '<div class="empty" style="padding:1.5rem">Ask the advisor to queue work, answer a question, or act on a draft.<br><span style="font-size:0.8rem;color:var(--muted)">Try: "What should I work on next?" or "fix the flaky login test"</span></div>'
    : '';
  return `<div class="dash-section">
    <div class="dash-section-title">Advisor</div>
    <div class="advisor-chat" id="dash-advisor-log" style="max-height:280px;overflow-y:auto">${emptyHint}${historyHtml}</div>
    <div class="advisor-input-row">
      <input type="text" id="dash-advisor-input" placeholder="Ask the advisor or describe work to queue…"
             onkeydown="dashAdvisorKeydown(event)">
      <button class="btn btn-primary" onclick="submitDashAdvisorDialog()">Send</button>
    </div>
  </div>`;
}

function dashAdvisorKeydown(e) {
  if (e.key === 'Enter') submitDashAdvisorDialog();
}

async function submitDashAdvisorDialog() {
  const input = document.getElementById('dash-advisor-input');
  const message = input.value.trim();
  if (!message) return;
  input.value = '';
  input.disabled = true;

  const log = document.getElementById('dash-advisor-log');
  if (log) {
    log.querySelector('.empty')?.remove();
    log.insertAdjacentHTML('beforeend', renderDashAdvisorMsg({ role: 'user', text: message }));
    log.scrollTop = log.scrollHeight;
  }

  try {
    const resp = await fetch('/api/advisor/dialog', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    const entry = await resp.json().catch(() => null);
    if (resp.ok && entry && log) {
      log.insertAdjacentHTML('beforeend', renderDashAdvisorMsg(entry));
      log.scrollTop = log.scrollHeight;
    } else if (log) {
      log.insertAdjacentHTML('beforeend', renderDashAdvisorMsg({ role: 'advisor', text: 'Sorry, something went wrong answering that.' }));
    }
  } catch (e) {
    if (log) log.insertAdjacentHTML('beforeend', renderDashAdvisorMsg({ role: 'advisor', text: 'Network error: ' + e.message }));
  } finally {
    input.disabled = false;
    input.focus();
  }
}

function approveDashAdvisorGoal(title, phase) {
  showPrompt('Confirm goal title:', title, async (confirmedTitle) => {
    if (confirmedTitle === null) return;
    try {
      const resp = await fetch('/api/goal/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: confirmedTitle, phase_id: phase || undefined }),
      });
      if (resp.ok) {
        showAlert('Goal queued: ' + confirmedTitle);
        switchTab('active');
      } else {
        showAlert('Failed to queue goal: ' + await resp.text());
      }
    } catch (e) {
      showAlert('Network error: ' + e.message);
    }
  });
}

function editDashAdvisorGoal(title) {
  const input = document.getElementById('dash-advisor-input');
  if (input) { input.value = title; input.focus(); }
}

async function toggleGoalDetail(goalId) {
  const detail = document.getElementById('goal-detail-' + goalId);
  if (!detail) return;
  const isVisible = detail.style.display !== 'none';
  if (isVisible) {
    detail.style.display = 'none';
    return;
  }
  detail.style.display = 'block';
  detail.innerHTML = '<div style="color:var(--muted);font-size:0.82rem">Loading log...</div>';
  try {
    const resp = await fetch('/api/goals/' + encodeURIComponent(goalId) + '/output');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json().catch(() => null);
    let logLines = '';

      logLines = data.lines.slice(-20).join('\n');

      logLines = data.output.split('\n').slice(-20).join('\n');

}

function askAdvisorAboutGoal(goalId, title) {
