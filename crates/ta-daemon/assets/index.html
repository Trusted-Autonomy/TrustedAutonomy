// ── Attention Queue (v0.17.0.12.17 item 1) ──────────────────────
// One canonical, always-visible "needs you" list. Previously the same three
// data sources (running goals, pending agent questions, drafts awaiting
// review) were independently fetched and rendered in up to three places —
// the Active tab, the Agent Questions tab, and the Dashboard's own copies of
// both — per docs/design/ta-concepts-and-architecture.md §6. This is now the
// single source; questions and drafts (which need a decision) sort above
// running goals (informational — nothing to decide yet).
let _attentionRefreshTimer = null;

async function loadAttentionQueue() {
  if (currentTab !== 'attention') return;
  if (!app.firstChild || app.querySelector('.loading, .empty')) {
    app.innerHTML = '<div class="loading">Loading...</div>';
  }
  try {
    const [questionsResp, draftsResp, activeResp] = await Promise.allSettled([
      fetch('/api/interactions/pending'),
      fetch('/api/drafts'),
      fetch('/api/active/goals'),
    ]);
    const questions = questionsResp.status === 'fulfilled' && questionsResp.value.ok
      ? await questionsResp.value.json().catch(() => []) : [];
    const allDrafts = draftsResp.status === 'fulfilled' && draftsResp.value.ok
      ? await draftsResp.value.json().catch(() => []) : [];
    const activeGoals = activeResp.status === 'fulfilled' && activeResp.value.ok
      ? await activeResp.value.json().catch(() => []) : [];
    const pendingDrafts = allDrafts.filter(d => d.status === 'PendingReview');

    updateAttentionBadge(questions.length, pendingDrafts.length);

    // A slow fetch above may have lost the race against the user navigating
    // away — bail before touching #app (same guard pattern as loadDashboard).
    if (currentTab !== 'attention') return;
    renderAttentionQueue(questions, pendingDrafts, activeGoals);
  } catch (e) {
    if (currentTab === 'attention') {
      app.innerHTML = '<div class="empty">Failed to load the attention queue. Is the daemon running?</div>';
    }
  }
  if (_attentionRefreshTimer) clearInterval(_attentionRefreshTimer);
  _attentionRefreshTimer = setInterval(() => {
    if (currentTab === 'attention') loadAttentionQueue();
    else { clearInterval(_attentionRefreshTimer); _attentionRefreshTimer = null; }
  }, 15000);
}

// Badge count on the Attention tab itself — questions + ready-to-review
// drafts are the two states that genuinely block on a human.
function updateAttentionBadge(questionCount, pendingDraftCount) {
  const tabEl = document.getElementById('tab-attention');
  if (!tabEl) return;
  const urgent = questionCount + pendingDraftCount;
  tabEl.textContent = urgent > 0 ? `Attention (${urgent})` : 'Attention';
  tabEl.style.color = urgent > 0 ? 'var(--yellow)' : '';
}

function renderAttentionQueue(questions, pendingDrafts, activeGoals) {
  if (questions.length === 0 && pendingDrafts.length === 0 && activeGoals.length === 0) {
    setAppContent('<div class="empty">Nothing needs your attention right now. Start a new goal from <strong>Activity → Plan</strong>, or ask the <strong>Advisor</strong>.</div>');
    return;
  }

  let html = '';

  if (questions.length > 0) {
    html += '<div class="dash-section-title">Questions (' + questions.length + ')</div>';
    html += questions.map((q, i) => `
      <div class="card question-card" id="q-${esc(q.interaction_id || i)}">
        <div class="card-header">
          <span class="card-title" style="font-size:0.95rem">${esc(q.prompt || q.question || 'Agent question')}</span>
          <span class="badge badge-question">Waiting</span>
        </div>
        <div class="card-meta">${timeAgo(q.created_at || q.timestamp)}
          ${q.goal_id ? ' &middot; goal: <code>' + esc(q.goal_id.slice(0, 8)) + '</code>' : ''}</div>
        ${q.context ? `<div style="margin-top:0.5rem;font-size:0.85rem;color:var(--muted)">${esc(q.context)}</div>` : ''}
        <div class="answer-input">
          <input id="ans-${i}" type="text" placeholder="Type your answer..."
                 onkeydown="if(event.key==='Enter')submitAnswer('${esc(q.interaction_id || '')}',${i})">
          <button class="btn btn-primary btn-sm"
                  onclick="submitAnswer('${esc(q.interaction_id || '')}',${i})">Reply</button>
        </div>
      </div>
    `).join('');
  }

  if (pendingDrafts.length > 0) {
    html += `<div class="dash-section-title" style="margin-top:${questions.length ? '1rem' : '0'}">Ready to Review (${pendingDrafts.length})</div>`;
    html += pendingDrafts.map(d => `
      <div class="card clickable" onclick="viewDraftDetail('${d.package_id}')">
        <div class="card-header">
          <span class="card-title">${esc(d.title)}</span>
          <span class="badge badge-pending">Needs Review</span>
        </div>
        <div class="card-meta">${d.artifact_count} artifact${d.artifact_count !== 1 ? 's' : ''} &middot; ${timeAgo(d.created_at)}</div>
      </div>
    `).join('');
  }

  if (activeGoals.length > 0) {
    html += `<div class="dash-section-title" style="margin-top:${(questions.length || pendingDrafts.length) ? '1rem' : '0'}">Running (${activeGoals.length})</div>`;
    html += activeGoals.map(g => {
      const elapsedMins = Math.max(0, Math.round(g.elapsed_secs / 60));
      const elapsedLabel = elapsedMins < 1 ? '<1m' : elapsedMins + 'm';
      return `<div class="card" id="active-row-${esc(g.goal_id)}">
        <div class="card-header clickable" onclick="toggleActiveRow('${esc(g.goal_id)}')">
          <span class="card-title">${esc(g.title)}</span>
          <span class="badge ${g.state === 'running' ? 'badge-success' : 'badge-info'}">${esc(g.state)}</span>
        </div>
        <div class="card-meta">
          ${elapsedLabel} elapsed${g.phase ? ' &middot; phase ' + esc(g.phase) : ''} &middot;
          <code style="font-size:0.75rem">${esc(g.goal_id.slice(0, 8))}</code>
        </div>
        <div class="card-meta" style="margin-top:0.25rem;color:var(--muted)">
          ${g.last_event ? esc(g.last_event.slice(0, 160)) : 'No output yet.'}
        </div>
        <div id="active-expand-${esc(g.goal_id)}" style="display:none;margin-top:0.75rem">
          <div class="advisor-input-row">
            <input type="text" id="active-msg-${esc(g.goal_id)}" placeholder="Send info / ask this agent…"
                   onkeydown="if(event.key==='Enter') sendActiveGoalMessage('${esc(g.goal_id)}')">
            <button class="btn btn-primary btn-sm" onclick="sendActiveGoalMessage('${esc(g.goal_id)}')">Send</button>
          </div>
          <div id="active-msg-status-${esc(g.goal_id)}" style="font-size:0.8rem;color:var(--muted);margin-top:0.4rem"></div>
        </div>
      </div>`;
    }).join('');
  }

  html += '<div style="margin-top:1rem;font-size:0.8rem;color:var(--muted);text-align:right">' +
    '<button class="btn btn-sm btn-ghost" onclick="loadAttentionQueue()">Refresh</button></div>';

  setAppContent(html);
}

      </div>
      <div class="card-meta">

        <code style="font-size:0.75rem">${esc(g.goal_id.slice(0, 8))}</code>
      </div>
      <div class="card-meta" style="margin-top:0.25rem;color:var(--muted)">
        ${g.last_event ? esc(g.last_event.slice(0, 160)) : 'No output yet.'}
      </div>
      <div id="active-expand-${esc(g.goal_id)}" style="display:none;margin-top:0.75rem">
        <div class="advisor-input-row">

          <button class="btn btn-primary btn-sm" onclick="sendActiveGoalMessage('${esc(g.goal_id)}')">Send</button>
        </div>
        <div id="active-msg-status-${esc(g.goal_id)}" style="font-size:0.8rem;color:var(--muted);margin-top:0.4rem"></div>

function toggleActiveRow(goalId) {
  const el = document.getElementById('active-expand-' + goalId);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  if (el.style.display === 'block') {
    const input = document.getElementById('active-msg-' + goalId);
    if (input) input.focus();
  }
}

async function sendActiveGoalMessage(goalId) {
  const input = document.getElementById('active-msg-' + goalId);
  const statusEl = document.getElementById('active-msg-status-' + goalId);
  const message = input ? input.value.trim() : '';
  if (!message) return;
  if (statusEl) { statusEl.style.color = 'var(--muted)'; statusEl.textContent = 'Sending…'; }
  try {
    const resp = await fetch('/api/goals/' + encodeURIComponent(goalId) + '/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    const data = await resp.json().catch(() => ({}));
    if (resp.ok) {
      if (input) input.value = '';
      if (statusEl) { statusEl.style.color = 'var(--green)'; statusEl.textContent = 'Delivered (' + (data.delivery || 'ok') + ').'; }
    } else if (statusEl) {
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = 'Failed: ' + (data.error || resp.status);
    }
  } catch (e) {
    if (statusEl) { statusEl.style.color = 'var(--red)'; statusEl.textContent = 'Network error: ' + e.message; }
  }
}

// ── Plan Tab (v0.14.19) ────────────────────────────────────────

let planPhases = [];
// Tracks which parent phase sub-phase lists are expanded.
const subPhaseExpanded = {};

// Returns true if id has 4+ numeric components (e.g. v0.16.0.1).
function isSubPhase(id) {
  if (!id || !id.startsWith('v')) return false;
  return id.slice(1).split('.').length >= 4;
}

// Returns the 3-component parent ID for a sub-phase (v0.16.0.1 → v0.16.0).
function parentPhaseId(id) {
  if (!isSubPhase(id)) return null;
  const parts = id.slice(1).split('.');
  return 'v' + parts.slice(0, 3).join('.');
}

// Build a map of parentId → [sub-phase objects] from the full phase list.
function buildSubPhaseMap(phases) {
  const map = {};
  for (const ph of phases) {
    if (isSubPhase(ph.id)) {
      const parent = parentPhaseId(ph.id);
      if (!map[parent]) map[parent] = [];
      map[parent].push(ph);
    }
  }
  return map;
}

async function loadPlan() {
  if (currentTab !== 'activity:plan') return;
  app.innerHTML = '<div class="loading">Loading plan...</div>';
  try {
    const resp = await fetch('/api/plan/phases');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    planPhases = await resp.json();
  } catch (e) {
    planPhases = [];
  }
  // Bail if the user navigated away while this fetch was in flight.
  if (currentTab !== 'activity:plan') return;
  renderPlan();
}

let planQueueExpanded = false;
// Top-level pending items (excluding sub-phases whose parent exists). Cached for togglePlanQueue.
let planQueueItems = [];

function renderPlan() {
  const subMap = buildSubPhaseMap(planPhases);
  // A sub-phase is treated as a top-level queue item when its parent either:
  //   (a) doesn't exist in the plan, or
  //   (b) exists but is already done.
  // This ensures pending sub-phases are never hidden behind a done parent card.
  const parentMap = new Map(planPhases.map(p => [p.id, p]));
  function isOrphanSubPhase(ph) {
    if (!isSubPhase(ph.id)) return false;
    const pid = parentPhaseId(ph.id);
    const parent = parentMap.get(pid);
    return !parent || parent.status === 'done';
  }
  planQueueItems = planPhases.filter(p =>
    (p.status === 'pending' || p.status === 'in_progress') &&
    (!isSubPhase(p.id) || isOrphanSubPhase(p))
  );
  const pending = planQueueItems;
  let html = '';

  // ── Next Up — show only the first pending phase; rest collapsible ───
  html += '<div class="dash-section">';
  if (pending.length === 0) {
    html += '<div class="dash-section-title">Next Up</div>';
    html += '<div class="card"><div class="card-meta">';
    if (planPhases.length === 0) {
      html += 'No PLAN.md found. Add phases below or run <code>ta plan create</code> in your project.';
    } else {
      html += 'All phases are complete. Add a new phase below.';
    }
    html += '</div></div>';
  } else {
    const next = pending[0];
    const rest = pending.slice(1);
    html += `<div class="dash-section-title">Next Up${rest.length > 0 ? ' <span style="color:var(--muted);font-size:0.8rem;font-weight:normal">(+' + rest.length + ' queued)</span>' : ''}</div>`;
    html += renderPhaseCard(next, subMap);

    if (rest.length > 0) {
      html += `<div style="margin-top:0.5rem">
        <button class="btn btn-ghost btn-sm" onclick="togglePlanQueue()" id="plan-queue-toggle">
          ${planQueueExpanded ? '▲ Hide queue' : '▼ Show ' + rest.length + ' more phase' + (rest.length !== 1 ? 's' : '')}
        </button>
      </div>`;
      html += `<div id="plan-queue-list" style="display:${planQueueExpanded ? 'block' : 'none'};margin-top:0.5rem">`;
      rest.forEach(ph => { html += renderPhaseCard(ph, subMap); });
      html += '</div>';
    }
  }
  html += '</div>';

  // ── Custom Goal ─────────────────────────────────────────────
  html += `<div class="dash-section">
    <div class="dash-section-title">Custom Goal</div>
    <div class="card">
      <div class="form-group">
        <label>What do you want to build or fix?</label>
        <textarea id="customGoalPrompt" rows="3"
          placeholder="Describe the goal for the agent..."></textarea>
      </div>
      <div style="display:flex;gap:1rem;align-items:flex-end;flex-wrap:wrap">
        <div class="form-group" style="flex:1;min-width:180px;margin-bottom:0">
          <label>Title <span style="color:var(--red)">*</span></label>
          <input id="customGoalTitle" type="text" placeholder="e.g. Fix auth bug">
        </div>
        <div class="form-group" style="flex:1;min-width:180px;margin-bottom:0">
          <label>Link to phase (optional)</label>
          <select id="customGoalPhase">
            <option value="">— none —</option>
            ${pending.map(p => `<option value="${esc(p.id)}">${esc(p.id)} — ${esc(p.title)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="actions" style="margin-top:1rem">
        <button class="btn btn-primary" onclick="submitCustomGoal()">Run Goal</button>
      </div>
      <div id="customGoalResult" style="margin-top:0.75rem;font-size:0.9rem"></div>
    </div>
  </div>`;

  // ── Add Phase ───────────────────────────────────────────────
  html += `<div class="dash-section">
    <div class="dash-section-title">Add Phase</div>
    <div class="card">
      <div class="form-group">
        <label>Phase title <span style="color:var(--red)">*</span></label>
        <input id="newPhaseTitle" type="text" placeholder="e.g. Add dark mode support">
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <textarea id="newPhaseDesc" rows="2"
          placeholder="What should this phase accomplish?"></textarea>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="submitAddPhase()">Add to Plan</button>
      </div>
      <div id="addPhaseResult" style="margin-top:0.75rem;font-size:0.9rem"></div>
    </div>
  </div>`;

  setAppContent(html);
}

function togglePlanQueue() {
  planQueueExpanded = !planQueueExpanded;
  const list = document.getElementById('plan-queue-list');
  const btn = document.getElementById('plan-queue-toggle');
  if (list) list.style.display = planQueueExpanded ? 'block' : 'none';
  if (btn) {
    const rest = planQueueItems.slice(1);
    btn.textContent = planQueueExpanded ? '▲ Hide queue' : '▼ Show ' + rest.length + ' more phase' + (rest.length !== 1 ? 's' : '');
  }
}

function renderPhaseCard(ph, subMap) {
  const isActive = ph.running || ph.status === 'in_progress';
  const isPrReady = ph.pr_ready;
  const statusBadge = ph.status === 'in_progress' && !isPrReady
    ? '<span class="badge badge-pending" style="margin-left:0.5rem">In Progress</span>'
    : '';
  const runningBadge = ph.running && !isPrReady
    ? '<span class="badge badge-active" style="margin-left:0.5rem">Running</span>'
    : '';
  const prReadyBadge = isPrReady
    ? '<span class="badge badge-pr-ready" style="margin-left:0.5rem">Ready for Review</span>'
    : '';
  const subs = (subMap && subMap[ph.id]) || [];
  const hasSubs = subs.length > 0;
  const expanded = subPhaseExpanded[ph.id] !== false; // default expanded
  const subSection = hasSubs ? renderSubPhases(ph.id, subs, expanded) : '';
  const chevron = hasSubs
    ? `<span class="chevron" onclick="toggleSubPhases('${esc(ph.id)}')" id="chevron-${esc(ph.id)}">${expanded ? '▼' : '▶'}</span>`
    : '';
  // Active button: pr_ready → link to specific draft detail; running → info
  const activeBtn = isPrReady
    ? (ph.draft_id
        ? `<button class="btn btn-sm btn-primary" style="background:var(--yellow);color:#000" onclick="viewDraftDetail('${esc(ph.draft_id)}')" title="Proposed change ready — click to review">Review Proposed Change</button>`
        : `<button class="btn btn-sm btn-primary" style="background:var(--yellow);color:#000" onclick="switchTab('drafts')" title="Proposed change ready — click to review">Review Proposed Change</button>`)
    : `<button class="btn btn-sm btn-ghost" onclick="showAlert('A goal for this phase is already running. Use the Dashboard to monitor progress, or the Drafts tab to review the output.')" title="A goal for this phase is already active">Active &#9654;</button>`;
  return `<div class="card" id="phase-card-${esc(ph.id)}">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:0.5rem;flex:1;min-width:0">
        ${chevron}
        <span style="color:var(--muted);font-family:monospace;font-size:0.8rem;flex-shrink:0">${esc(ph.id)}</span>
        <span class="card-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ph.title)}</span>
        ${statusBadge}${runningBadge}${prReadyBadge}
      </div>
      <div style="display:flex;gap:0.5rem;flex-shrink:0">
        <button class="btn btn-sm btn-ghost" onclick="togglePhaseExpand('${esc(ph.id)}')">Details</button>
        ${(isActive || isPrReady)
          ? activeBtn
          : `<button class="btn btn-sm btn-primary" id="run-btn-${esc(ph.id)}" onclick="runPhase('${esc(ph.id)}')">Run</button>`
        }
      </div>
    </div>
    <div class="card-meta" id="phase-desc-${esc(ph.id)}" style="margin-top:0.35rem">
      ${ph.description ? esc(ph.description) : ''}
    </div>
    <div id="phase-expand-${esc(ph.id)}" style="display:none;margin-top:0.75rem">
      ${renderPhaseDetails(ph)}
    </div>
    <div id="subphases-${esc(ph.id)}" style="display:${expanded ? 'block' : 'none'}">
      ${subSection}
    </div>
  </div>`;
}

// Render the sub-phase section inside a parent card.
function renderSubPhases(parentId, subs, expanded) {
  if (!subs || subs.length === 0) return '';
  let html = '<div class="subphase-list">';
  for (const sub of subs) {
    if (sub.status === 'done') {
      html += `<div class="subphase-item-done">
        <span class="sub-check">✓</span>
        <span style="font-family:monospace;font-size:0.75rem">${esc(sub.id)}</span>
        <span style="text-decoration:line-through">${esc(sub.title)}</span>
      </div>`;
    } else {
      const subActive = sub.running || sub.status === 'in_progress';
      const subBadge = sub.status === 'in_progress'
        ? '<span class="badge badge-pending" style="margin-left:0.4rem;font-size:0.7rem">In Progress</span>'
        : '';
      const subRunBadge = sub.running
        ? '<span class="badge badge-active" style="margin-left:0.4rem;font-size:0.7rem">Running</span>'
        : '';
      html += `<div class="subphase-card${subActive ? ' active' : ''}">
        <div class="subphase-header">
          <div style="display:flex;align-items:center;gap:0.4rem;flex:1;min-width:0">
            <span class="subphase-id">${esc(sub.id)}</span>
            <span class="subphase-title">${esc(sub.title)}</span>
            ${subBadge}${subRunBadge}
          </div>
          <div style="display:flex;gap:0.4rem;flex-shrink:0">
            ${subActive
              ? `<button class="btn btn-sm btn-ghost" onclick="showAlert('A goal for this phase is already running. Run \`ta goal list\` to see active goals.')">Active &#9654;</button>`
              : `<button class="btn btn-sm btn-primary" id="run-btn-${esc(sub.id)}" onclick="runPhase('${esc(sub.id)}')">Run</button>`
            }
          </div>
        </div>
        ${sub.description ? `<div style="font-size:0.8rem;color:var(--muted);margin-top:0.35rem">${esc(sub.description)}</div>` : ''}
      </div>`;
    }
  }
  html += '</div>';
  return html;
}

function toggleSubPhases(parentId) {
  const el = document.getElementById('subphases-' + parentId);
  const chevron = document.getElementById('chevron-' + parentId);
  if (!el) return;
  const nowExpanded = el.style.display === 'none';
  el.style.display = nowExpanded ? 'block' : 'none';
  subPhaseExpanded[parentId] = nowExpanded;
  if (chevron) chevron.textContent = nowExpanded ? '▼' : '▶';
}

function renderPhaseDetails(ph) {
  let html = '';
  if (ph.depends_on && ph.depends_on.length > 0) {
    html += `<div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem">
      Depends on: ${ph.depends_on.map(d => `<span class="tag">${esc(d)}</span>`).join(' ')}
    </div>`;
  }
  if (ph.items && ph.items.length > 0) {
    html += '<div style="font-size:0.85rem">';
    ph.items.forEach(item => {
      const icon = item.done
        ? '<span style="color:var(--green)">✓</span>'
        : '<span style="color:var(--muted)">○</span>';
      const style = item.done ? 'color:var(--muted);text-decoration:line-through' : '';
      html += `<div style="display:flex;gap:0.5rem;padding:0.2rem 0;${style}">${icon} ${esc(item.text)}</div>`;
    });
    html += '</div>';
  } else {
    html += '<div style="font-size:0.85rem;color:var(--muted)">No checklist items.</div>';
  }
  return html;
}

function togglePhaseExpand(id) {
  const el = document.getElementById('phase-expand-' + id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function runPhase(phaseId) {
  // Check for out-of-order execution: warn if earlier pending phases exist.
  const pendingBefore = planPhases.filter(p => {
    if (p.status === 'done' || p.status === 'in_progress') return false;
    const idx = planPhases.indexOf(p);
    const targetIdx = planPhases.findIndex(p2 => p2.id === phaseId || 'v' + p2.id === phaseId);
    return idx < targetIdx;
  });
  if (pendingBefore.length > 0) {
    const first = pendingBefore[0];
    const firstName = first.id + ' — ' + first.title;
    const msg = 'Out-of-order phase run\n\n' +
      phaseId + ' has ' + pendingBefore.length + ' unfinished predecessor' + (pendingBefore.length !== 1 ? 's' : '') + '.\n' +
      'First pending: ' + firstName + '\n\n' +
      'Re-order: run the predecessor first.\n' +
      'Run anyway: proceed and log the acknowledgement.';
    // Use native dialog with two options.
    const dlg = document.getElementById('ta-dialog');
    const body = document.getElementById('ta-dialog-body');
    const actions = document.getElementById('ta-dialog-actions');
    if (dlg && body && actions) {
      body.innerHTML = `<p style="font-weight:600;margin-bottom:0.5rem">Out-of-order phase run</p>
        <p style="color:var(--muted);font-size:0.9rem"><strong>${esc(phaseId)}</strong> has ${pendingBefore.length} unfinished predecessor${pendingBefore.length !== 1 ? 's' : ''}.</p>
        <p style="color:var(--muted);font-size:0.85rem">First pending: <code>${esc(firstName)}</code></p>`;
      actions.innerHTML = `
        <button class="btn btn-ghost" onclick="document.getElementById('ta-dialog').close();_doRunPhase(${JSON.stringify(first.id)})">Re-order — run ${esc(first.id)} first</button>
        <button class="btn btn-primary" onclick="document.getElementById('ta-dialog').close();_doRunPhase(${JSON.stringify(phaseId)})">Run anyway</button>`;
      dlg.showModal();
    } else {
      showConfirm(msg, () => _doRunPhase(phaseId), null);
    }
    return;
  }
  _doRunPhase(phaseId);
}

async function _doRunPhase(phaseId) {
  const btn = document.getElementById('run-btn-' + phaseId);
  if (btn) { btn.disabled = true; btn.textContent = 'Starting…'; }
  try {
    const resp = await fetch('/api/goal/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phase_id: phaseId })
    });
    if (resp.ok) {
      if (btn) { btn.textContent = 'Running'; }
      setTimeout(() => switchTab('dashboard'), 1200);
    } else {
      const text = await resp.text();
      if (btn) { btn.disabled = false; btn.textContent = 'Run'; }
      showAlert('Failed to start goal: ' + text);
    }
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Run'; }
    showAlert('Network error: ' + e.message);
  }
}

async function submitCustomGoal() {
  const title = document.getElementById('customGoalTitle')?.value.trim() || '';
  const prompt = document.getElementById('customGoalPrompt')?.value.trim() || '';
  const phaseId = document.getElementById('customGoalPhase')?.value || '';
  const result = document.getElementById('customGoalResult');

  if (!title) {
    if (result) { result.innerHTML = '<span style="color:var(--red)">Title is required.</span>'; }
    return;
  }

  if (result) result.innerHTML = '<span style="color:var(--muted)">Starting goal…</span>';

  const body = {
    title,
    prompt: prompt || undefined,
    phase_id: phaseId || undefined,
  };

  try {
    const resp = await fetch('/api/goal/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (resp.ok) {
      if (result) result.innerHTML = '<span style="color:var(--green)">Goal started!</span>';
      setTimeout(() => switchTab('dashboard'), 1200);
    } else {
      const text = await resp.text();
      if (result) result.innerHTML = '<span style="color:var(--red)">Error: ' + esc(text) + '</span>';
    }
  } catch (e) {
    if (result) result.innerHTML = '<span style="color:var(--red)">Could not reach daemon. ' +
      'Start it with <code>ta daemon start</code>.</span>';
  }
}

async function submitAddPhase() {
  const title = document.getElementById('newPhaseTitle')?.value.trim() || '';
  const description = document.getElementById('newPhaseDesc')?.value.trim() || '';
  const result = document.getElementById('addPhaseResult');

  if (!title) {
    if (result) result.innerHTML = '<span style="color:var(--red)">Title is required.</span>';
    return;
  }

  if (result) result.innerHTML = '<span style="color:var(--muted)">Adding phase…</span>';

  try {
    const resp = await fetch('/api/plan/phase/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description })
    });
    if (resp.ok) {
      const phase = await resp.json();
      if (result) result.innerHTML = `<span style="color:var(--green)">Phase ${esc(phase.id)} added.</span>`;
      if (document.getElementById('newPhaseTitle')) document.getElementById('newPhaseTitle').value = '';
      if (document.getElementById('newPhaseDesc')) document.getElementById('newPhaseDesc').value = '';
      // Reload plan to show the new phase.
      setTimeout(() => loadPlan(), 800);
    } else {
      const text = await resp.text();
      if (result) result.innerHTML = '<span style="color:var(--red)">Error: ' + esc(text) + '</span>';
    }
  } catch (e) {
    if (result) result.innerHTML = '<span style="color:var(--red)">Network error: ' + esc(e.message) + '</span>';
  }
}

// ── Draft Review ───────────────────────────────────────────────
async function loadDrafts() {
  if (currentTab !== 'activity:drafts') return;
  app.innerHTML = '<div class="loading">Loading drafts...</div>';
  try {
    const resp = await fetch('/api/drafts');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    drafts = await resp.json();
    // Bail if the user navigated away while this fetch was in flight.
    if (currentTab !== 'activity:drafts') return;
    renderDraftList();
  } catch (e) {
    if (currentTab === 'activity:drafts') {
      app.innerHTML = '<div class="empty">Failed to load drafts. Is the daemon running?</div>';
    }
  }
}

let draftShowAll = false;
// Normalize to no-underscore lowercase for comparison.
const DRAFT_ACTIVE_STATUSES = new Set(['draft', 'pendingreview', 'approved']);

function draftIsActive(d) {
  return DRAFT_ACTIVE_STATUSES.has(draftStatus(d).toLowerCase().replace(/[_]/g, ''));
}

function renderDraftList() {
  if (!drafts || drafts.length === 0) {
    app.innerHTML = '<div class="empty">No drafts yet. Start a goal from the <strong>Plan</strong> tab.</div>';
    return;
  }
  const visible = draftShowAll ? drafts : drafts.filter(draftIsActive);
  const hiddenCount = drafts.length - visible.length;
  setAppContent(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
      <span style="color:var(--muted);font-size:0.85rem">${visible.length} draft${visible.length !== 1 ? 's' : ''}${hiddenCount > 0 ? ' <span style="color:var(--muted)">(+' + hiddenCount + ' closed/applied)</span>' : ''}</span>
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-sm btn-ghost" title="${draftShowAll ? 'Hide closed/applied' : 'Show all drafts'}" onclick="draftShowAll=!draftShowAll;renderDraftList()">
          ${draftShowAll ? '&#9632; Active only' : '&#9636; Show all'}
        </button>
        <button class="btn btn-sm btn-ghost" onclick="loadDrafts()">&#8635; Refresh</button>
      </div>
    </div>
  ` + (visible.length === 0
    ? '<div class="empty">No active drafts. <button class="btn btn-sm btn-ghost" onclick="draftShowAll=true;renderDraftList()">Show all</button></div>'
    : visible.map(d => `
    <div class="card clickable" onclick="showDraftDetail('${d.package_id}')">
      <div class="card-header">
        <span class="card-title">${esc(d.title)}</span>
        <span class="badge ${badgeClass(d.status)}">${esc(humanizeStatus(draftStatus(d)))}</span>
      </div>
      <div class="card-meta">
        ${d.artifact_count} artifact${d.artifact_count !== 1 ? 's' : ''} &middot;
        ${timeAgo(d.created_at)} &middot;
        <code style="font-size:0.75rem">${d.package_id.slice(0, 8)}</code>
      </div>
    </div>
  `).join('')));
}

async function showDraftDetail(id) {
  if (currentTab !== 'activity:drafts') return;
  app.innerHTML = '<div class="loading">Loading draft...</div>';
  try {
    const [draftResp, phasesResp, dialogResp] = await Promise.allSettled([
      fetch('/api/drafts/' + id),
      fetch('/api/plan/phases'),
      fetch('/api/drafts/' + id + '/dialog'),
    ]);
    // Bail if the user navigated away while these fetches were in flight.
    if (currentTab !== 'activity:drafts') return;
    if (draftResp.status !== 'fulfilled' || !draftResp.value.ok) {
      const reason = draftResp.status === 'fulfilled' ? ('HTTP ' + draftResp.value.status) : draftResp.reason;
      console.error('Failed to load draft ' + id + ':', reason);
      showAlert('Failed to load draft details (' + reason + '). Showing the draft list instead.');
      renderDraftList();
      return;
    }
    const d = await draftResp.value.json();

    let phaseDescription = '';
    if (d.plan_phase && phasesResp.status === 'fulfilled' && phasesResp.value.ok) {
      const phases = await phasesResp.value.json().catch(() => []);
      const match = (phases || []).find(p => p.id === d.plan_phase);
      if (match) phaseDescription = match.description || '';
    }
    const dialogEntries = dialogResp.status === 'fulfilled' && dialogResp.value.ok
      ? (await dialogResp.value.json().catch(() => ({ entries: [] }))).entries || []
      : [];

    if (currentTab !== 'activity:drafts') return;
    renderDraftDetail(d, phaseDescription, dialogEntries);
  } catch (e) {
    if (currentTab !== 'activity:drafts') return;
    console.error('Failed to load draft ' + id + ':', e);
    showAlert('Failed to load draft details: ' + e.message);
    renderDraftList();
  }
}

// Per-file apply selection state, keyed by draft id → { [resource_uri]: boolean }.
// Defaults to "everything selected" the first time a draft is opened.
window._draftSelection = window._draftSelection || {};

function getDraftSelection(d) {
  const artifacts = (d.changes && d.changes.artifacts) || [];
  if (!window._draftSelection[d.package_id]) {
    const sel = {};
    // Default each checkbox from the draft's own per-artifact disposition
    // rather than blanket-checking everything: an artifact the agent/reviewer
    // already marked "rejected" starts unchecked, everything else (pending,
    // approved, discuss) starts checked — matching the common case where no
    // disposition was set while still respecting one that was.
    artifacts.forEach(a => { sel[a.resource_uri] = a.disposition !== 'rejected'; });
    window._draftSelection[d.package_id] = sel;
  }
  return window._draftSelection[d.package_id];
}

function toggleArtifactSelection(packageId, uri, checked) {
  if (!window._draftSelection[packageId]) window._draftSelection[packageId] = {};
  window._draftSelection[packageId][uri] = checked;
  const cached = window._draftDetailCache && window._draftDetailCache[packageId];
  if (cached) renderDraftDetail(cached.draft, cached.phaseDescription, cached.dialogEntries);
}

// Select All / Clear All (item 8): bulk-set every artifact's checkbox at once.
function setAllArtifactSelection(packageId, checked) {
  const cached = window._draftDetailCache && window._draftDetailCache[packageId];
  const artifacts = cached ? ((cached.draft.changes && cached.draft.changes.artifacts) || []) : [];
  if (!window._draftSelection[packageId]) window._draftSelection[packageId] = {};
  artifacts.forEach(a => { window._draftSelection[packageId][a.resource_uri] = checked; });
  if (cached) renderDraftDetail(cached.draft, cached.phaseDescription, cached.dialogEntries);
}

// Returns warnings for artifacts that are selected but depend on a
// deselected artifact (item 10).
function computeDependencyWarnings(d, selection) {
  const artifacts = (d.changes && d.changes.artifacts) || [];
  const warnings = [];
  for (const a of artifacts) {
    if (selection[a.resource_uri] === false) continue; // not selected, nothing to warn about
    for (const dep of (a.dependencies || [])) {
      if (dep.kind !== 'depends_on') continue;
      if (selection[dep.target_uri] === false) {
        warnings.push(`${a.resource_uri} depends on ${dep.target_uri}, which is deselected.`);
      }
    }
  }
  return warnings;
}

// Visual preview for image/video artifacts (v0.17.0.12.17 item 5): the
// Changes list previously showed every artifact as a bare resource_uri text
// row, even though the backend already carries `ArtifactKind::Image`/`Video`
// metadata for renders. Fetches bytes from the new
// `/api/drafts/:id/artifact?uri=...` endpoint.
function renderArtifactPreview(packageId, a) {
  const kind = a.kind;
  if (!kind || (kind.type !== 'image' && kind.type !== 'video')) return '';
  const src = '/api/drafts/' + packageId + '/artifact?uri=' + encodeURIComponent(a.resource_uri);
  const dims = kind.width && kind.height ? `${kind.width}×${kind.height}` : '';
  if (kind.type === 'image') {
    const caption = [dims, kind.format].filter(Boolean).join(' · ');
    return `<div style="margin-top:0.5rem">
      <img src="${esc(src)}" alt="${esc(a.resource_uri)}" loading="lazy"
           style="max-width:320px;max-height:240px;border-radius:6px;border:1px solid var(--border);display:block"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <div style="display:none;font-size:0.78rem;color:var(--muted)">Preview unavailable.</div>
      ${caption ? `<div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem">${esc(caption)}</div>` : ''}
    </div>`;
  }
  const durationLabel = typeof kind.duration_secs === 'number' ? kind.duration_secs.toFixed(1) + 's' : '';
  const caption = [dims, durationLabel, kind.fps ? kind.fps + 'fps' : '', kind.format].filter(Boolean).join(' · ');
  return `<div style="margin-top:0.5rem">
    <video src="${esc(src)}" controls preload="metadata"
           style="max-width:320px;max-height:240px;border-radius:6px;border:1px solid var(--border);display:block"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'"></video>
    <div style="display:none;font-size:0.78rem;color:var(--muted)">Preview unavailable.</div>
    ${caption ? `<div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem">${esc(caption)}</div>` : ''}
  </div>`;
}

function renderSupervisorReviewBody(sv) {
  const verdict = (sv.verdict || sv.result || '').toLowerCase();
  const verdictColor = verdict === 'pass' ? 'var(--green)' : verdict === 'block' ? 'var(--red)' : 'var(--yellow)';
  const verdictIcon = verdict === 'pass' ? '✓' : verdict === 'block' ? '✗' : '⚠';
  const findings = Array.isArray(sv.findings) ? sv.findings : (sv.notes ? [sv.notes] : []);
  const recommendation = sv.summary || '';
  return (verdict ? `<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem">
      <span style="font-weight:700;color:${verdictColor};font-size:1rem">${verdictIcon} Risk level: ${esc(verdict.toUpperCase())}</span>
      ${sv.agent ? `<span style="font-size:0.8rem;color:var(--muted)">via ${esc(sv.agent)}</span>` : ''}
    </div>` : '') +
    (findings.length > 0 ? `<div style="font-weight:600;font-size:0.85rem;margin-bottom:0.25rem">Issues</div>` +
      findings.map(f => `<p style="font-size:0.85rem;color:var(--muted);margin:0.15rem 0">• ${esc(typeof f === 'string' ? f : JSON.stringify(f))}</p>`).join('') : '') +
    (recommendation ? `<div style="font-weight:600;font-size:0.85rem;margin-top:0.5rem;margin-bottom:0.25rem">Recommendation</div><p style="margin:0">${esc(recommendation)}</p>` : '');
}

function renderDraftDetail(d, phaseDescription, dialogEntries) {
  phaseDescription = phaseDescription || '';
  dialogEntries = dialogEntries || [];
  // Cache the raw inputs so checkbox toggles (item 9) can re-render without
  // an extra round-trip to the server.
  window._draftDetailCache = window._draftDetailCache || {};
  window._draftDetailCache[d.package_id] = { draft: d, phaseDescription, dialogEntries };

  const artifacts = (d.changes && d.changes.artifacts) || [];
  const pendingActions = (d.changes && d.changes.pending_actions) || [];
  const status = draftStatus(d);
  const isReviewable = status === 'pendingreview';
  const isApproved = status.includes('approved');
  const selection = getDraftSelection(d);
  const warnings = computeDependencyWarnings(d, selection);

  // Summary section with a distinct "Why" subsection (item 8), above the
  // list of changes.
  const goalTitle = (d.goal && d.goal.title) || '';
  let summaryBody = '';
  if (goalTitle || phaseDescription) {
    summaryBody += `<div style="font-weight:600;font-size:0.85rem;margin-bottom:0.25rem">Why</div>`;
    summaryBody += `<p style="margin:0 0 0.75rem 0">${esc(goalTitle)}${phaseDescription ? ' — ' + esc(phaseDescription) : ''}</p>`;
  }
  if (d.summary) {
    const text = d.summary.description || d.summary.what_changed || d.summary.why || '';
    if (text) summaryBody += `<p>${esc(text)}</p>`;
  }
  const summarySection = `<details open class="section"><summary>Summary</summary><div class="detail-body">${summaryBody || '<p style="color:var(--muted)">No summary.</p>'}</div></details>`;

  // AI Safety Review section (item 7; renamed from "Supervisor Review" as
  // part of the plain-language copy pass, item 6): this draft's own review,
  // plus (when it differs — e.g. a follow-up draft that didn't re-run the
  // supervisor) the initial review from the goal's first draft.
  let supervisorBody = d.supervisor_review ? renderSupervisorReviewBody(d.supervisor_review) : '';
  if (d.initial_supervisor_review) {
    supervisorBody += `<div style="margin-top:${supervisorBody ? '1rem' : '0'};padding-top:${supervisorBody ? '0.75rem' : '0'};${supervisorBody ? 'border-top:1px solid var(--border)' : ''}">
      <div style="font-weight:600;font-size:0.85rem;margin-bottom:0.25rem;color:var(--muted)">Initial AI Safety Review (from the goal's first proposed change)</div>
      ${renderSupervisorReviewBody(d.initial_supervisor_review)}
    </div>`;
  }
  const supervisorSection = supervisorBody
    ? `<details open class="section"><summary>AI Safety Review</summary><div class="detail-body">${supervisorBody}</div></details>`
    : `<details class="section"><summary>AI Safety Review</summary><div class="detail-body"><p style="color:var(--muted)">No AI safety review is attached to this proposed change.</p></div></details>`;

  // Agent Decision Log section.
  let decisionBody = '';
  if (Array.isArray(d.agent_decision_log) && d.agent_decision_log.length > 0) {
    decisionBody = d.agent_decision_log.map(entry => {
      const dec = entry.decision || entry.title || '';
      const rat = entry.rationale || entry.reason || '';
      const conf = typeof entry.confidence === 'number' ? Math.round(entry.confidence * 100) + '%' : '';
      return `<div class="artifact" style="margin-bottom:0.5rem">
        <div style="font-weight:600;font-size:0.9rem">${esc(dec)}</div>
        ${rat ? `<div style="font-size:0.82rem;color:var(--muted);margin-top:0.25rem">${esc(rat)}</div>` : ''}
        ${conf ? `<div style="font-size:0.78rem;color:var(--muted);margin-top:0.15rem">Confidence: ${conf}</div>` : ''}
      </div>`;
    }).join('');
  }
  const decisionSection = decisionBody ? `<details class="section"><summary>Agent Decision Log</summary><div class="detail-body">${decisionBody}</div></details>` : '';

  // Changes section (item 9): renamed from "Changed Files", each row gets a
  // checkbox (default checked) that excludes the file from Apply.
  const selectedCount = artifacts.filter(a => selection[a.resource_uri] !== false).length;
  const filesBody = artifacts.length === 0
    ? '<p style="color:var(--muted)">No artifacts</p>'
    : artifacts.map(a => `
        <div class="artifact" style="display:flex;align-items:flex-start;gap:0.5rem">
          <input type="checkbox" style="margin-top:0.3rem" ${selection[a.resource_uri] !== false ? 'checked' : ''}
                 onchange="toggleArtifactSelection('${d.package_id}', ${JSON.stringify(a.resource_uri)}, this.checked)">
          <div style="flex:1">
            <span class="artifact-uri">${esc(a.resource_uri)}</span>
            <span style="color:var(--muted);margin-left:0.4rem">${esc(a.change_type || a.disposition || '')}</span>
            ${a.explanation_tiers && a.explanation_tiers.summary ? '<br><span style="font-size:0.8rem;color:var(--muted)">' + esc(a.explanation_tiers.summary) + '</span>' : ''}
            ${renderArtifactPreview(d.package_id, a)}
          </div>
        </div>`).join('');
  // Select All / Clear All (item 8): bulk-toggle every checkbox at once.
  const selectAllControls = artifacts.length > 0 ? `
    <div style="display:flex;gap:0.75rem;margin-bottom:0.6rem">
      <button type="button" class="btn btn-ghost btn-sm" onclick="setAllArtifactSelection('${d.package_id}', true)">Select All</button>
      <button type="button" class="btn btn-ghost btn-sm" onclick="setAllArtifactSelection('${d.package_id}', false)">Clear All</button>
    </div>` : '';
  const filesSection = `<details open class="section"><summary>Changes (${selectedCount}/${artifacts.length} selected)</summary><div class="detail-body">${selectAllControls}${filesBody}</div></details>`;

  // Dependency warnings (item 10): shown above the Approve/Apply buttons.
  const warningsSection = warnings.length > 0 ? `
    <details open class="section" style="border-color:var(--yellow)"><summary style="color:var(--yellow)">Warnings (${warnings.length})</summary><div class="detail-body">
      ${warnings.map(w => `<p style="font-size:0.85rem;color:var(--yellow);margin:0.2rem 0">⚠ ${esc(w)}</p>`).join('')}
    </div></details>` : '';

  // Merge conflicts (v0.17.0.12.7): unresolved shared-file conflicts from
  // this goal's most recent apply attempt. Read-only in this phase — resolve
  // the listed file manually, then re-run `ta draft apply`. Full interactive
  // resolution (diff editor) is deferred to v0.18 per the phase's own scope note.
  const conflicts = Array.isArray(d.conflicts) ? d.conflicts : [];
  const conflictsSection = conflicts.length > 0 ? `
    <details open class="section" style="border-color:var(--red)"><summary style="color:var(--red)">⚠ Merge Conflicts (${conflicts.length})</summary><div class="detail-body">
      <p style="font-size:0.85rem;color:var(--muted)">These shared files could not be auto-merged during apply. Resolve manually in the project files, then re-run <code>ta draft apply ${esc(String(d.package_id).slice(0, 8))}</code>.</p>
      ${conflicts.map(c => `
        <div class="artifact">
          <span class="artifact-uri">${esc(c.path)}</span>
          <pre style="white-space:pre-wrap;font-size:0.8rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.5rem;margin-top:0.3rem">${esc(c.content)}</pre>
        </div>`).join('')}
    </div></details>` : '';

  // Advisor patches queued while a goal was running, not yet replayed onto
  // the project (v0.17.0.12.7).
  const advisorPatches = Array.isArray(d.pending_advisor_patches) ? d.pending_advisor_patches : [];
  const advisorPatchesSection = advisorPatches.length > 0 ? `
    <details class="section"><summary>Queued Advisor Changes (${advisorPatches.length})</summary><div class="detail-body">
      <p style="font-size:0.85rem;color:var(--muted)">Advisor-triggered edits queued while a goal was running — replayed automatically on the next <code>ta draft apply</code>.</p>
      ${advisorPatches.map(p => `
        <div class="artifact">
          <span class="artifact-uri">${esc(p.path)}</span>
          &middot; ${esc(p.description)}
        </div>`).join('')}
    </div></details>` : '';

  // Safety Rules Check section (renamed from "Constitution Check" as part
  // of the plain-language copy pass, item 6 — "Constitution" is TA's internal
  // name for its policy-enforcement layer, not a term a reviewer would know).
  let constitutionBody = '';
  if (Array.isArray(d.validation_log) && d.validation_log.length > 0) {
    constitutionBody = d.validation_log.map(entry => {
      const rule = entry.rule || entry.check || entry.name || '';
      const result = entry.result || entry.status || entry.outcome || '';
      const color = (result + '').toLowerCase().includes('pass') ? 'var(--green)' : (result + '').toLowerCase().includes('fail') ? 'var(--red)' : 'var(--muted)';
      return `<div style="display:flex;gap:0.5rem;padding:0.2rem 0;font-size:0.85rem"><span style="color:${color};flex-shrink:0">${esc(result || '·')}</span><span>${esc(rule)}</span></div>`;
    }).join('');
  }
  const constitutionSection = constitutionBody ? `<details class="section"><summary>Safety Rules Check</summary><div class="detail-body">${constitutionBody}</div></details>` : '';

  // Pending actions.
  const pendingSection = pendingActions.length > 0 ? `
    <details class="section"><summary>Pending Actions (${pendingActions.length})</summary><div class="detail-body">
      ${pendingActions.map(a => `
        <div class="artifact">
          <span class="artifact-uri">${esc(a.tool_name)}</span>
          &middot; ${esc(a.kind)} &middot; ${esc(a.description)}
        </div>`).join('')}
    </div></details>` : '';

  // Per-draft Q&A dialog (items 11, 12). Rendered above the action row
  // (item 4, v0.17.0.12.17): a reviewer asking "is this safe to apply?"
  // reads the answer before hitting Approve/Apply/Deny, not after.
  const dialogSection = renderDraftDialogSection(d.package_id, dialogEntries);

  setAppContent(`
    <span class="back" onclick="loadDrafts()">&larr; Back to drafts</span>
    <div class="detail">
      <div class="card-header">
        <span class="card-title">${esc(d.goal && d.goal.title || 'Proposed Change')}</span>
        <span class="badge ${badgeClass(d.status)}">${esc(humanizeStatus(status))}</span>
      </div>
      <div class="card-meta">
        <code>${d.package_id}</code> &middot; ${new Date(d.created_at).toLocaleString()}
      </div>
      ${summarySection}
      ${supervisorSection}
      ${decisionSection}
      ${filesSection}
      ${warningsSection}
      ${conflictsSection}
      ${advisorPatchesSection}
      ${constitutionSection}
      ${pendingSection}
      ${dialogSection}
      <div class="actions">
        ${isReviewable ? `
          <button class="btn btn-approve" onclick="doDraftAction('${d.package_id}','approve')">Approve</button>
          <button class="btn btn-primary" onclick="doDraftAction('${d.package_id}','apply')" title="Apply draft to workspace (no CLI required)">Apply</button>
          <button class="btn btn-deny" onclick="doDraftAction('${d.package_id}','deny')">Deny</button>
        ` : isApproved ? `
          <button class="btn btn-primary" onclick="doDraftAction('${d.package_id}','apply')" title="Apply approved draft to workspace">Apply</button>
          <button class="btn btn-deny" onclick="doDraftAction('${d.package_id}','deny')">Deny</button>
        ` : `
          <button class="btn btn-ghost" onclick="loadDrafts()">&larr; Back</button>
        `}
      </div>
    </div>
  `);
}

// ── Per-draft Q&A dialog (v0.17.0.12.6 items 11, 12) ───────────

function renderDraftDialogMsg(entry) {
  if (entry.role === 'user') {
    return `<div class="advisor-msg user">${esc(entry.text)}</div>`;
  }
  return `<div class="advisor-msg advisor">${esc(entry.text)}</div>`;
}

function renderDraftDialogSection(draftId, entries) {
  const historyHtml = entries.map(renderDraftDialogMsg).join('');
  const emptyHint = entries.length === 0
    ? '<div class="empty" style="padding:1.5rem">Ask about this draft — "Is this safe to apply?", "What does change X do?", "Can I apply just the UI changes?" — or tell the advisor to amend it, follow it up, or add it to the plan.</div>'
    : '';
  return `<details open class="section"><summary>Ask about this draft</summary><div class="detail-body">
    <div class="advisor-chat" id="draft-dialog-log-${esc(draftId)}" style="max-height:320px;overflow-y:auto">${emptyHint}${historyHtml}</div>
    <div class="advisor-input-row">
      <input type="text" id="draft-dialog-input-${esc(draftId)}" placeholder="Ask about this draft, or tell the advisor what to do…"
             onkeydown="if(event.key==='Enter') submitDraftDialog('${esc(draftId)}')">
      <button class="btn btn-primary" onclick="submitDraftDialog('${esc(draftId)}')">Send</button>
    </div>
  </div></details>`;
}

async function submitDraftDialog(draftId) {
  const input = document.getElementById('draft-dialog-input-' + draftId);
  const message = input ? input.value.trim() : '';
  if (!message) return;
  input.value = '';
  input.disabled = true;

  const log = document.getElementById('draft-dialog-log-' + draftId);
  if (log) {
    log.querySelector('.empty')?.remove();
    log.insertAdjacentHTML('beforeend', renderDraftDialogMsg({ role: 'user', text: message }));
    log.scrollTop = log.scrollHeight;
  }

  try {
    const resp = await fetch('/api/drafts/' + draftId + '/dialog', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    const entry = await resp.json().catch(() => null);
    if (resp.ok && entry) {
      if (log) {
        log.insertAdjacentHTML('beforeend', renderDraftDialogMsg(entry));
        log.scrollTop = log.scrollHeight;
      }
      // "apply"/"deny" replies inside the dialog trigger the same action buttons.
      if (entry.action === 'apply' || entry.action === 'deny') {
        doDraftAction(draftId, entry.action);
      }
    } else if (log) {
      log.insertAdjacentHTML('beforeend', renderDraftDialogMsg({ role: 'advisor', text: 'Sorry, something went wrong answering that.' }));
    }
  } catch (e) {
    if (log) log.insertAdjacentHTML('beforeend', renderDraftDialogMsg({ role: 'advisor', text: 'Network error: ' + e.message }));
  } finally {
    input.disabled = false;
    input.focus();
  }
}

async function doDraftAction(id, action) {
  const btn = event && event.target;

  if (action === 'approve' || action === 'apply') {
    // Dependency warnings (item 10): if any selected file depends on a
    // deselected one, require an explicit confirmation before proceeding.
    const cached = window._draftDetailCache && window._draftDetailCache[id];
    const warnings = cached ? computeDependencyWarnings(cached.draft, getDraftSelection(cached.draft)) : [];
    if (warnings.length > 0) {
      showConfirm(
        `This draft has ${warnings.length} dependency warning(s):\n${warnings.join('\n')}\n\nProceed anyway?`,
        () => runDraftAction(id, action, btn),
      );
      return;
    }
  }
  runDraftAction(id, action, btn);
}

// Per-file selection (item 7/9): resource_uris still checked in the Changes
// section for the given draft, or null if the draft was never opened (in
// which case Approve/Deny/Apply act on the whole draft, unchanged).
function getSelectedUris(id) {
  const cached = window._draftDetailCache && window._draftDetailCache[id];
  if (!cached) return null;
  const selection = getDraftSelection(cached.draft);
  const artifacts = (cached.draft.changes && cached.draft.changes.artifacts) || [];
  return artifacts.filter(a => selection[a.resource_uri] !== false).map(a => a.resource_uri);
}

async function runDraftAction(id, action, btn) {
  if (action === 'apply') {
    // Kick off a background apply job and poll for progress (v0.17.0.12.5).
    // The endpoint returns immediately with a job_id instead of blocking on
    // the subprocess, so the UI shows live progress instead of a long stall.
    if (btn) btn.disabled = true;
    const statusEl = document.createElement('div');
    statusEl.style.cssText = 'margin-top:0.75rem;font-size:0.85rem;color:var(--accent)';
    statusEl.textContent = 'Starting apply…';
    if (btn && btn.parentElement) btn.parentElement.appendChild(statusEl);
    try {
      const selectedUris = getSelectedUris(id);
      const r = await fetch('/api/drafts/' + id + '/apply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(selectedUris ? { selected_uris: selectedUris } : {}),
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok && data.job_id) {
        pollApplyJob(data.job_id, statusEl, btn);
      } else {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = 'Apply failed to start: ' + (data.error || r.status) + '.';
        if (btn) btn.disabled = false;
      }
    } catch (e) {
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = 'Network error: ' + e.message;
      if (btn) btn.disabled = false;
    }
    return;
  }

  if (action === 'deny') {
    showPrompt('Reason for denial:', 'Needs revision', async (reason) => {
      if (reason === null) return;
      if (btn) btn.disabled = true;
      try {
        const selectedUris = getSelectedUris(id);
        const body = { reason: reason || 'denied via web UI' };
        if (selectedUris) body.selected_uris = selectedUris;
        const resp = await fetch('/api/drafts/' + id + '/deny', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (resp.ok) {
          await loadDrafts();
        } else {
          showAlert('Deny failed: ' + await resp.text());
          if (btn) btn.disabled = false;
        }
      } catch (e) {
        showAlert('Network error');
        if (btn) btn.disabled = false;
      }
    });
    return;
  }

  // Remaining action: 'approve'. Also acts on the selected subset (item 7) —
  // deselected files are stamped `rejected` on the draft's own artifacts
  // rather than silently ignored.
  if (btn) btn.disabled = true;
  try {
    const selectedUris = getSelectedUris(id);
    const resp = await fetch('/api/drafts/' + id + '/' + action, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(selectedUris ? { selected_uris: selectedUris } : {}),
    });
    if (resp.ok) {
      await loadDrafts();
    } else {
      showAlert('Action failed: ' + await resp.text());
      if (btn) btn.disabled = false;
    }
  } catch (e) {
    showAlert('Network error');
    if (btn) btn.disabled = false;
  }
}

// ── Apply job progress (v0.17.0.12.5) ──────────────────────────
const APPLY_POLL_INTERVAL_MS = 2000;

function pollApplyJob(jobId, statusEl, btn) {
  let elapsed = 0;
  const tick = async () => {
    let job;
    try {
      const r = await fetch('/api/apply-jobs/' + jobId);
      if (!r.ok) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = 'Lost track of apply job (' + r.status + ').';
        if (btn) btn.disabled = false;
        return;
      }
      job = await r.json();
    } catch (e) {
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = 'Network error while polling apply job: ' + e.message;
      if (btn) btn.disabled = false;
      return;
    }

    if (job.status === 'running') {
      elapsed += APPLY_POLL_INTERVAL_MS / 1000;
      statusEl.style.color = 'var(--accent)';
      statusEl.textContent = 'Applying draft… (' + elapsed + 's)';
      setTimeout(tick, APPLY_POLL_INTERVAL_MS);
      return;
    }

    if (job.status === 'done') {
      const sha = job.commit_sha ? ' — commit: ' + job.commit_sha : '';
      statusEl.style.color = 'var(--green)';
      statusEl.textContent = 'Applied successfully' + sha + '.';
      setTimeout(() => loadDrafts(), 2000);
      return;
    }

    // job.status === 'failed'
    statusEl.style.color = 'var(--red)';
    statusEl.innerHTML = '';
    statusEl.append('Apply failed. ');
    const viewLogBtn = document.createElement('button');
    viewLogBtn.className = 'btn btn-ghost btn-sm';
    viewLogBtn.textContent = 'View Log';
    viewLogBtn.onclick = () => showApplyLogModal(job);
    statusEl.appendChild(viewLogBtn);
    if (btn) btn.disabled = false;
  };
  tick();
}

function showApplyLogModal(job) {
  const overlay = document.getElementById('link-modal-overlay');
  const body = document.getElementById('link-modal-body');
  body.innerHTML = `
    <div style="margin-bottom:1rem">
      <strong style="font-size:1rem">Apply Log</strong>
      <p style="font-size:0.75rem;color:var(--muted);margin:0.3rem 0 0;font-family:monospace">${esc(job.log_path || '')}</p>
    </div>
    <pre>${esc(job.output || '(no output captured)')}</pre>
  `;
  overlay.style.display = 'flex';
}

// ── Agent Questions ────────────────────────────────────────────
async function loadQuestions() {
  app.innerHTML = '<div class="loading">Loading questions...</div>';
  try {
    const resp = await fetch('/api/interactions/pending');
    const questions = resp.ok ? await resp.json().catch(() => []) : [];
    renderQuestions(questions);
  } catch (e) {
    app.innerHTML = '<div class="empty">Failed to load questions. Is the daemon running?</div>';
  }
}

function renderQuestions(questions) {
  if (!questions || questions.length === 0) {
    app.innerHTML = `
      <div class="empty">
        <p>No pending questions from agents.</p>
        <p style="margin-top:0.5rem;font-size:0.85rem">When an agent needs clarification, its question will appear here.</p>
        <button class="btn btn-sm btn-ghost" style="margin-top:1rem" onclick="loadQuestions()">Refresh</button>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
      <span style="color:var(--muted);font-size:0.85rem">${questions.length} question${questions.length !== 1 ? 's' : ''} waiting</span>
      <button class="btn btn-sm btn-ghost" onclick="loadQuestions()">Refresh</button>
    </div>
  ` + questions.map((q, i) => `
    <div class="card question-card" id="q-${esc(q.interaction_id || i)}">
      <div class="card-header">
        <span class="card-title" style="font-size:0.95rem">${esc(q.prompt || q.question || 'Agent question')}</span>
        <span class="badge badge-question">Waiting</span>
      </div>
      <div class="card-meta">${timeAgo(q.created_at || q.timestamp)}
        ${q.goal_id ? ' &middot; goal: <code>' + esc(q.goal_id.slice(0, 8)) + '</code>' : ''}</div>
      ${q.context ? `<div style="margin-top:0.5rem;font-size:0.85rem;color:var(--muted)">${esc(q.context)}</div>` : ''}
      <div class="answer-input">
        <input id="ans-${i}" type="text" placeholder="Type your answer..."
               onkeydown="if(event.key==='Enter')submitAnswer('${esc(q.interaction_id || '')}',${i})">
        <button class="btn btn-primary btn-sm"
                onclick="submitAnswer('${esc(q.interaction_id || '')}',${i})">Reply</button>
      </div>
    </div>
  `).join('');
}

async function submitAnswer(id, idx) {
  const input = document.getElementById('ans-' + idx);
  if (!input) return;
  const answer = input.value.trim();
  if (!answer) { input.focus(); return; }

  input.disabled = true;
  try {
    const resp = await fetch('/api/interactions/' + id + '/respond', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ response: answer })
    });
    if (resp.ok) {
      // Remove the card.
      const card = document.getElementById('q-' + id) || input.closest('.card');
      if (card) {
        card.style.opacity = '0.5';
        card.innerHTML += '<div style="color:var(--green);margin-top:0.5rem;font-size:0.85rem">Answer sent.</div>';
      }
      // Answered from the Attention Queue (the only place this renders since
      // the redesign) — refresh that, not the now-unreachable standalone
      // questions view.
      setTimeout(() => { if (currentTab === 'attention') loadAttentionQueue(); else loadQuestions(); }, 800);
    } else {
      const text = await resp.text();
      showAlert('Failed to send answer: ' + text);
      input.disabled = false;
    }
  } catch (e) {
    showAlert('Network error');
    input.disabled = false;
  }
}

// ── Memory ─────────────────────────────────────────────────────
async function loadMemory() {
  app.innerHTML = '<div class="loading">Loading memory...</div>';
  try {
    const [statsResp, entriesResp] = await Promise.all([
      fetch('/api/memory/stats'),
      fetch('/api/memory?limit=50')
    ]);
    const stats = statsResp.ok ? await statsResp.json().catch(() => ({})) : {};
    const entries = entriesResp.ok ? await entriesResp.json().catch(() => []) : [];
    renderMemory(stats, entries);
  } catch (e) {
    app.innerHTML = '<div class="empty">Failed to load memory store.</div>';
  }
}

function renderMemory(stats, entries) {
  const cats = Object.entries(stats.by_category || {}).sort((a, b) => b[1] - a[1]);
  app.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${stats.total_entries || 0}</div><div class="stat-label">Total Entries</div></div>
      <div class="stat-card"><div class="stat-value">${stats.expired_count || 0}</div><div class="stat-label">Expired</div></div>
      <div class="stat-card"><div class="stat-value">${typeof stats.avg_confidence === 'number' ? stats.avg_confidence.toFixed(2) : '—'}</div><div class="stat-label">Avg Confidence</div></div>
      <div class="stat-card"><div class="stat-value">${cats.length}</div><div class="stat-label">Categories</div></div>
    </div>
    ${cats.length > 0 ? `<div class="section"><h3>By Category</h3>${cats.map(([c,n]) => `<span class="tag">${esc(c)}: ${n}</span>`).join(' ')}</div>` : ''}
    <div class="search-bar" style="margin-top:1rem">
      <input type="text" id="memSearch" placeholder="Search memory entries..." onkeydown="if(event.key==='Enter')searchMemory()">
      <button class="btn btn-primary btn-sm" onclick="searchMemory()">Search</button>
      <button class="btn btn-sm btn-ghost" onclick="showCreateForm()">+ New</button>
    </div>
    <div id="memEntries">${renderMemoryEntries(entries)}</div>
  `;
}

function renderMemoryEntries(entries) {
  if (!entries || entries.length === 0) return '<div class="empty">No memory entries.</div>';
  return entries.map(e => {
    const val = typeof e.value === 'string' ? e.value : JSON.stringify(e.value);
    const preview = val && val.length > 80 ? val.slice(0, 77) + '...' : (val || '');
    const confPct = Math.round((e.confidence || 0) * 100);
    return `
      <div class="card" style="cursor:default">
        <div class="card-header">
          <span class="card-title" style="font-size:0.95rem">${esc(e.key)}</span>
          <span>
            ${e.category ? `<span class="badge badge-cat">${esc(e.category)}</span>` : ''}
            <span class="confidence-bar"><span class="confidence-fill" style="width:${confPct}%"></span></span>
          </span>
        </div>
        <div style="font-size:0.85rem;color:var(--muted);margin-top:0.4rem">${esc(preview)}</div>
        <div class="card-meta">
          source: ${esc(e.source)} &middot; ${timeAgo(e.updated_at)}
          ${(e.tags || []).length ? ' &middot; ' + e.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('') : ''}
          <span style="float:right;cursor:pointer;color:var(--red)" onclick="deleteMemory('${esc(e.key)}')">delete</span>
        </div>
      </div>
    `;
  }).join('');
}

async function searchMemory() {
  const q = document.getElementById('memSearch').value.trim();
  if (!q) { loadMemory(); return; }
  try {
    const resp = await fetch('/api/memory/search?q=' + encodeURIComponent(q));
    const entries = resp.ok ? await resp.json().catch(() => []) : [];
    const el = document.getElementById('memEntries');
    if (el) el.innerHTML = renderMemoryEntries(entries);
  } catch (e) { /* ignore */ }
}

function deleteMemory(key) {
  showConfirm('Delete memory entry "' + key + '"?', async () => {
    try {
      await fetch('/api/memory/' + encodeURIComponent(key), { method: 'DELETE' });
      loadMemory();
    } catch (e) { showAlert('Failed to delete'); }
  });
}

function showCreateForm() {
  app.innerHTML = `
    <span class="back" onclick="loadMemory()">&larr; Back to memory</span>
    <div class="detail">
      <h3 style="margin-bottom:1rem">Create Memory Entry</h3>
      <div class="form-group">
        <label>Key <span style="color:var(--red)">*</span></label>
        <input id="newKey" type="text" placeholder="e.g., convention:use-tempdir">
      </div>
      <div class="form-group">
        <label>Value</label>
        <textarea id="newValue" placeholder="Text or JSON value"></textarea>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="newCategory">
          <option value="">None</option>
          <option value="convention">Convention</option>
          <option value="architecture">Architecture</option>
          <option value="history">History</option>
          <option value="preference">Preference</option>
          <option value="relationship">Relationship</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tags (comma-separated)</label>
        <input id="newTags" type="text" placeholder="e.g., testing, rust">
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="createMemory()">Create</button>
        <button class="btn btn-ghost" onclick="loadMemory()">Cancel</button>
      </div>
    </div>
  `;
}

async function createMemory() {
  const key = document.getElementById('newKey').value.trim();
  if (!key) { showAlert('Key is required'); return; }
  const val = document.getElementById('newValue').value.trim() || key;
  const cat = document.getElementById('newCategory').value || undefined;
  const tags = document.getElementById('newTags').value.split(',').map(s => s.trim()).filter(Boolean);
  let value;
  try { value = JSON.parse(val); } catch { value = val; }
  try {
    const resp = await fetch('/api/memory', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, value, tags, category: cat })
    });
    if (resp.ok) loadMemory();
    else showAlert('Failed: ' + await resp.text());
  } catch (e) { showAlert('Network error'); }
}

// ── Setup Wizard ──────────────────────────────────────────────
let wizardStep = 1;
const wizardData = { agent: {}, vcs: {}, notifications: {}, project: {} };

async function checkWizard() {
  try {
    const resp = await fetch('/api/setup/status');
    if (!resp.ok) return;
    const status = await resp.json();
    if (!status.wizard_complete) {
      wizardStep = status.step || 1;
      showWizardOverlay();
    }
  } catch (e) { /* daemon not ready yet */ }
}

function showWizardOverlay() {
  document.getElementById('wizard-overlay').style.display = 'block';
  renderWizardStep(wizardStep);
}

function hideWizardOverlay() {
  document.getElementById('wizard-overlay').style.display = 'none';
}

async function saveWizardProgress(step, complete) {
  try {
    await fetch('/api/setup/progress', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ step, wizard_complete: !!complete })
    });
  } catch (e) { /* best-effort */ }
}

function wizardProgressBar(step) {
  const steps = ['Agent', 'VCS', 'Notifications', 'Project', 'Done'];
  const bars = steps.map((s, i) => {
    const active = i + 1 === step ? 'color:var(--accent);font-weight:700' : (i + 1 < step ? 'color:var(--green)' : 'color:var(--muted)');
    return `<span style="${active};margin:0 0.5rem">${i + 1 < step ? '✓' : (i + 1 === step ? '●' : '○')} ${esc(s)}</span>`;
  }).join('');
  return `<div style="text-align:center;margin-bottom:1.5rem;font-size:0.85rem">${bars}</div>`;
}

async function validateWizardApiKey() {
  const key = document.getElementById('wiz-api-key').value.trim();
  const el = document.getElementById('wiz-validate-result');
  try {
    const resp = await fetch('/api/settings/agent/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: key })
    });
    const data = await resp.json();
    el.style.color = resp.ok ? 'var(--green)' : 'var(--red)';
    el.textContent = data.message || data.status;
  } catch (e) { el.textContent = 'Network error'; el.style.color = 'var(--red)'; }
}

async function checkWizardVcs() {
  const url = document.getElementById('wiz-repo-url').value.trim();
  const token = document.getElementById('wiz-vcs-token').value.trim();
  const el = document.getElementById('wiz-vcs-result');
  try {
    const resp = await fetch('/api/settings/vcs/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, token })
    });
    const data = await resp.json();
    el.style.color = resp.ok ? 'var(--green)' : 'var(--red)';
    el.textContent = data.message || data.status;
  } catch (e) { el.textContent = 'Network error'; el.style.color = 'var(--red)'; }
}

async function testWizardNotification(channel) {
  const urlEl = document.getElementById('wiz-' + channel + '-url');
  const resultEl = document.getElementById('wiz-' + channel + '-result');
  if (!urlEl || !resultEl) return;
  try {
    const resp = await fetch('/api/settings/notifications/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: urlEl.value.trim(), channel })
    });
    const data = await resp.json();
    resultEl.style.color = resp.ok ? 'var(--green)' : 'var(--red)';
    resultEl.textContent = data.message || data.status;
  } catch (e) { resultEl.textContent = 'Network error'; resultEl.style.color = 'var(--red)'; }
}

function wizardBack(fromStep) {
  wizardStep = fromStep - 1;
  saveWizardProgress(wizardStep, false);
  renderWizardStep(wizardStep);
}

function wizardNext(fromStep) {
  // Collect data from current step.
  if (fromStep === 1) {
    wizardData.agent.framework = document.getElementById('wiz-framework').value;
    wizardData.agent.apiKey = document.getElementById('wiz-api-key').value;
  } else if (fromStep === 2) {
    wizardData.vcs.type = document.getElementById('wiz-vcs-type').value;
    wizardData.vcs.url = document.getElementById('wiz-repo-url').value;
    wizardData.vcs.token = document.getElementById('wiz-vcs-token').value;
  } else if (fromStep === 3) {
    wizardData.notifications.discord = document.getElementById('wiz-discord-url').value;
    wizardData.notifications.slack = document.getElementById('wiz-slack-url').value;
  } else if (fromStep === 4) {
    wizardData.project.name = document.getElementById('wiz-proj-name').value;
    wizardData.project.desc = document.getElementById('wiz-proj-desc').value;
    wizardData.project.goal = document.getElementById('wiz-proj-goal').value;
    wizardData.project.approval = document.getElementById('wiz-approval').value;
  }
  wizardStep = fromStep + 1;
  saveWizardProgress(wizardStep, false);
  renderWizardStep(wizardStep);
}

async function finishWizard() {
  await saveWizardProgress(5, true);
  hideWizardOverlay();
  switchTab('dashboard');
}

// ── Settings Tab ───────────────────────────────────────────────
let settingsSection = 'agent';

async function loadSettings() {
  app.innerHTML = `
    <div style="display:flex;gap:1.5rem;align-items:flex-start">
      <div style="min-width:150px">
        <div class="dash-section-title">Settings</div>
        ${['agent','vcs','workflow','policy','constitution','notifications','memory','studio','advanced'].map(s =>
          `<div class="tab" style="display:block;border:none;padding:0.4rem 0.75rem;border-radius:6px;margin-bottom:0.25rem;${settingsSection===s?'background:var(--surface);color:var(--accent)':''}" onclick="loadSettingsSection('${s}')">${s.charAt(0).toUpperCase()+s.slice(1)}</div>`
        ).join('')}
      </div>
      <div id="settings-main" style="flex:1"></div>
    </div>`;
  loadSettingsSection(settingsSection);
}

async function loadSettingsSection(section) {
  settingsSection = section;
  const el = document.getElementById('settings-main');
  if (!el) return;
  el.innerHTML = '<div class="loading">Loading...</div>';
  // Re-render the sidebar to highlight active section.
  document.querySelectorAll('.tab[onclick^="loadSettingsSection"]').forEach(t => {
    const s = t.getAttribute('onclick').match(/'(\w+)'/)?.[1];
    t.style.color = s === section ? 'var(--accent)' : '';
    t.style.background = s === section ? 'var(--surface)' : '';
  });

  if (section === 'advanced') {
    el.innerHTML = `
      <h3 style="margin-bottom:1rem">Advanced — Raw Config Editors</h3>
      <p style="color:var(--muted);font-size:0.9rem;margin-bottom:1rem">Edit configuration files directly. Changes take effect on next daemon restart.</p>
      <div class="form-group">
        <label>daemon.toml path: <code>.ta/daemon.toml</code></label>
        <textarea id="raw-daemon" style="min-height:200px;font-family:monospace" placeholder="Loading..."></textarea>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="saveRawConfig()">Save daemon.toml</button>
      </div>`;
    return;
  }

  try {
    const resp = await fetch('/api/settings/' + section);
    if (!resp.ok) { el.innerHTML = '<div class="empty">Section not available.</div>'; return; }
    const result = await resp.json();
    const data = result.data || {};
    el.innerHTML = renderSettingsForm(section, data);
  } catch (e) { el.innerHTML = '<div class="empty">Could not load settings.</div>'; }
}

function renderSettingsForm(section, data) {
  const field = (key, label, type, val, placeholder) =>
    `<div class="form-group"><label>${label}</label><input id="setting-${key}" type="${type}" value="${esc(val)}" placeholder="${esc(placeholder||'')}"></div>`;
  const select = (key, label, options, val) =>
    `<div class="form-group"><label>${label}</label><select id="setting-${key}">${options.map(([v,l])=>`<option value="${v}"${val===v?' selected':''}>${l}</option>`).join('')}</select></div>`;
  const toggle = (key, label, val) =>

async function loadWorkflowToml() {
  const el = document.getElementById('studio-workflow-toml');
  if (!el) return;
  el.value = 'Loading...';
  try {
    const r = await fetch('/api/cmd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: 'cat .ta/workflow.toml 2>/dev/null || echo ""' })
    });
    const data = await r.json().catch(() => ({}));
    el.value = (data.output || data.stdout || '').trim();
  } catch(e) {
    el.value = '# Could not load workflow.toml: ' + e.message;
  }
}

async function saveWorkflowToml() {
  const el = document.getElementById('studio-workflow-toml');
  const status = document.getElementById('studio-toml-status');
  const content = el ? el.value : '';
  if (!content.trim()) { if (status) { status.textContent = 'Nothing to save.'; status.style.color = 'var(--muted)'; } return; }
  // Write via cmd endpoint.
  const escaped = content.replace(/'/g, "'\\''");
  try {
    const r = await fetch('/api/cmd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: `mkdir -p .ta && cat > .ta/workflow.toml << 'TAEOF'\n${content}\nTAEOF` })
    });
    if (r.ok) {
      if (status) { status.textContent = 'Saved to .ta/workflow.toml.'; status.style.color = 'var(--green)'; }
    } else {
      if (status) { status.textContent = 'Save failed: ' + r.status; status.style.color = 'var(--red)'; }
    }
  } catch(e) {
    if (status) { status.textContent = 'Error: ' + e.message; status.style.color = 'var(--red)'; }
  }
}

async function saveSettings(section) {
  const resultEl = document.getElementById('settings-save-result');
  const data = {};
  document.querySelectorAll('[id^="setting-"]').forEach(el => {
    const key = el.id.replace('setting-', '');
    data[key] = el.type === 'checkbox' ? el.checked : (el.type === 'number' ? Number(el.value) : el.value);
  });
  try {
    const resp = await fetch('/api/settings/' + section, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data })
    });
    const result = await resp.json();
    if (resultEl) {
      resultEl.style.color = resp.ok ? 'var(--green)' : 'var(--red)';
      resultEl.textContent = resp.ok ? 'Saved.' : (result.error || 'Error saving settings.');
    }
  } catch (e) { if (resultEl) { resultEl.style.color = 'var(--red)'; resultEl.textContent = 'Network error'; } }
}
