async function initNewProject() {
  const nameEl = document.getElementById('newproject-name');
  const pathEl = document.getElementById('newproject-path');
  const status = document.getElementById('newproject-status');
  const name = nameEl ? nameEl.value.trim() : '';
  const path = pathEl ? pathEl.value.trim() : '';
  if (!name) { if (status) { status.textContent = 'Project name is required.'; status.style.color = 'var(--red)'; } return; }
  if (!path) { if (status) { status.textContent = 'Project path is required.'; status.style.color = 'var(--red)'; } return; }
  if (status) status.textContent = 'Initializing...';
  try {
    const resp = await fetch('/api/project/init', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, path })
    });
    const result = await resp.json();
    if (result.ok) {
      if (status) { status.textContent = 'Project initialized at ' + result.path; status.style.color = 'var(--green)'; }
      // Auto-open the new project.
      setTimeout(() => openProject(result.path), 1200);
    } else {
      if (status) { status.textContent = 'Error: ' + (result.error || 'Could not initialize.'); status.style.color = 'var(--red)'; }
    }
  } catch (e) {
    if (status) { status.textContent = 'Network error: ' + e.message; status.style.color = 'var(--red)'; }
  }
}

function useWorkflowTemplate(id, name, description) {
  // Pre-fill the generator with the template name and description.
  const input = document.getElementById('wf-desc-input');
  if (input) {
    input.value = description;
    input.scrollIntoView({ behavior: 'smooth' });
    input.focus();
  }
  // Kick off generation with a synthetic template request.
  generateWorkflow();
}

async function generateWorkflow() {
  const input = document.getElementById('wf-desc-input');
  const desc = input ? input.value.trim() : '';
  if (!desc) { showAlert('Please enter a description.'); return; }
  try {
    const resp = await fetch('/api/workflow/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description: desc })
    });
    const result = await resp.json();
    const generated = document.getElementById('wf-generated');
    const editor = document.getElementById('wf-toml-editor');
    if (editor) editor.value = result.toml || '';
    if (generated) generated.style.display = 'block';
  } catch (e) {
    showAlert('Error generating workflow: ' + e.message);
  }
}

async function saveWorkflow() {
  const editor = document.getElementById('wf-toml-editor');
  const status = document.getElementById('wf-save-status');
  const toml = editor ? editor.value : '';
  if (!toml.trim()) { if (status) status.textContent = 'No TOML to save.'; return; }
  // Extract id from the toml name field or generate slug.
  const nameMatch = toml.match(/^name\s*=\s*"([^"]+)"/m);
  const id = nameMatch ? nameMatch[1].toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-_]/g, '') : 'new-workflow';
  try {
    const resp = await fetch('/api/workflow/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, toml })
    });
    const result = await resp.json();
    if (result.ok) {
      if (status) { status.textContent = 'Saved to ' + result.path; status.style.color = 'var(--green)'; }
      setTimeout(() => loadWorkflows(), 1200);
    } else {
      if (status) { status.textContent = 'Error: ' + (result.error || 'Unknown'); status.style.color = 'var(--red)'; }
    }
  } catch (e) {
    if (status) { status.textContent = 'Network error: ' + e.message; status.style.color = 'var(--red)'; }
  }
}

// ── Workflow Run / Stop / Status (v0.15.14.1) ─────────────────
async function runWorkflow(id) {
  const msgEl = document.getElementById('wf-msg-' + id);
  const statusEl = document.getElementById('wf-status-' + id);
  if (msgEl) msgEl.textContent = 'Starting…';
  if (statusEl) { statusEl.textContent = 'starting'; statusEl.className = 'badge badge-info'; }
  try {
    const resp = await fetch('/api/workflow/' + encodeURIComponent(id) + '/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    });
    const result = await resp.json();
    if (resp.ok) {
      if (msgEl) { msgEl.textContent = result.message || 'Workflow started.'; msgEl.style.color = 'var(--green)'; }
    } else {
      if (msgEl) { msgEl.textContent = result.error || 'Failed to start.'; msgEl.style.color = 'var(--red)'; }
      if (statusEl) { statusEl.textContent = 'idle'; statusEl.className = 'badge badge-default'; }
    }
  } catch (e) {
    if (msgEl) { msgEl.textContent = 'Network error: ' + e.message; msgEl.style.color = 'var(--red)'; }
  }
}

async function stopWorkflow(id) {
  const msgEl = document.getElementById('wf-msg-' + id);
  if (msgEl) msgEl.textContent = 'Sending stop signal…';
  try {
    const resp = await fetch('/api/workflow/' + encodeURIComponent(id), { method: 'DELETE' });
    const result = await resp.json();
    if (resp.ok) {
      if (msgEl) { msgEl.textContent = result.message || 'Stop requested.'; msgEl.style.color = 'var(--amber, orange)'; }
    } else {
      if (msgEl) { msgEl.textContent = result.error || 'Could not stop.'; msgEl.style.color = 'var(--red)'; }
    }
  } catch (e) {
    if (msgEl) { msgEl.textContent = 'Network error: ' + e.message; msgEl.style.color = 'var(--red)'; }
  }
}

async function pollWorkflowStatus(id) {
  // Stop any existing poller for this id.
  if (_wfStatusPollers[id]) {
    clearInterval(_wfStatusPollers[id]);
    delete _wfStatusPollers[id];
  }
  const doFetch = async () => {
    const statusEl = document.getElementById('wf-status-' + id);
    if (!statusEl) {
      // Card was removed from DOM — stop polling.
      clearInterval(_wfStatusPollers[id]);
      delete _wfStatusPollers[id];
      return;
    }
    try {
      const resp = await fetch('/api/workflow/' + encodeURIComponent(id) + '/status');
      if (!resp.ok) return;
      const data = await resp.json();
      const state = data.state || 'idle';
      const badgeClass = state === 'running' ? 'badge-success'
        : state === 'awaiting_human' ? 'badge-warning'
        : state === 'completed' ? 'badge-info'
        : state === 'failed' ? 'badge-danger'
        : 'badge-default';
      statusEl.textContent = state;
      statusEl.className = 'badge ' + badgeClass;
      const msgEl = document.getElementById('wf-msg-' + id);
      if (msgEl && data.current_stage) {
        msgEl.textContent = 'Stage: ' + data.current_stage;
        msgEl.style.color = 'var(--muted)';
      }
    } catch (_) { /* ignore network errors during polling */ }
  };
  doFetch();
  _wfStatusPollers[id] = setInterval(doFetch, 2000);
}

async function loadTeamRoles() {
  app.innerHTML = '<div class="loading">Loading team...</div>';
  try {
    const [teamResp, agentsResp, personasResp] = await Promise.allSettled([
      fetch('/api/team'),
      fetch('/api/agents/profiles'),
      fetch('/api/personas'),
    ]);
    const members = teamResp.status === 'fulfilled' && teamResp.value.ok
      ? (await teamResp.value.json().catch(() => ({ members: [] }))).members || [] : [];
    const agentProfiles = agentsResp.status === 'fulfilled' && agentsResp.value.ok

async function assignTeamMember() {
  const role = document.getElementById('team-role-input').value.trim();
  const agentId = document.getElementById('team-agent-input').value.trim();
  const security = document.getElementById('team-security-input').value;
  const persona = document.getElementById('team-persona-input').value.trim();
  const statusEl = document.getElementById('team-assign-status');
  if (!role || !agentId) {
    if (statusEl) { statusEl.style.color = 'var(--red)'; statusEl.textContent = 'Role and agent/model are both required.'; }
    return;
  }
  if (statusEl) { statusEl.style.color = 'var(--muted)'; statusEl.textContent = 'Assigning…'; }
  try {
    const resp = await fetch('/api/team/assign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role, agent_id: agentId, security, persona: persona || null }),
    });
    if (resp.ok) {
      loadTeamRoles();
    } else {
      const data = await resp.json().catch(() => ({}));
      if (statusEl) { statusEl.style.color = 'var(--red)'; statusEl.textContent = 'Failed: ' + (data.error || resp.status); }
    }
  } catch (e) {
    if (statusEl) { statusEl.style.color = 'var(--red)'; statusEl.textContent = 'Network error: ' + e.message; }
  }
}

async function removeTeamMember(role) {
  showConfirm(`Remove the "${role}" role assignment?`, async () => {
    try {
      const resp = await fetch('/api/team/' + encodeURIComponent(role), { method: 'DELETE' });
      if (resp.ok) loadTeamRoles();
      else showAlert('Failed to remove: ' + await resp.text());
    } catch (e) {
      showAlert('Network error: ' + e.message);
    }
  });
}

function renderAgents(profiles) {
  let html = '<div class="section"><h3>Agent Profiles</h3>';

  if (profiles.length === 0) {
    html += '<p style="color:var(--muted)">No agent profiles installed.</p>';
    html += '<p style="color:var(--muted);font-size:0.85rem">Install an Ollama profile: <code>ta agent install gemma4</code></p>';
    html += '</div>';
    setAppContent(html);
    return;
  }

  const project = profiles.filter(p => p.source === 'project');
  const user = profiles.filter(p => p.source === 'user');
  const builtin = profiles.filter(p => p.source === 'builtin');

  const renderTable = (list, title) => {
    if (!list.length) return '';
    let t = `<h4 style="margin:0.75rem 0 0.4rem;color:var(--muted);font-size:0.8rem;text-transform:uppercase;letter-spacing:.05em">${title}</h4>`;
    t += '<table style="width:100%;border-collapse:collapse;font-size:0.85rem">';
    t += '<thead><tr style="color:var(--muted);text-align:left;border-bottom:1px solid var(--border)">'
       + '<th style="padding:0.3rem 0.5rem">Name</th>'
       + '<th style="padding:0.3rem 0.5rem">Model</th>'
       + '<th style="padding:0.3rem 0.5rem">Inherit</th>'
       + '<th style="padding:0.3rem 0.5rem">Ctx</th>'
       + '<th style="padding:0.3rem 0.5rem">Used By</th>'
       + '</tr></thead><tbody>';
    for (const p of list) {
      const model = p.model || '—';
      const inherit = p.inherit ? (p.inherit.replace(/^.*\//, '~/…/')) : '—';
      const ctx = p.context_file_count || 0;
      const wf = (p.used_by_workflows || []).join(', ') || '—';
      t += `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:0.3rem 0.5rem;font-weight:500">${p.name}</td>
        <td style="padding:0.3rem 0.5rem;color:var(--muted)">${model}</td>
        <td style="padding:0.3rem 0.5rem;color:var(--muted);font-size:0.78rem">${inherit}</td>

        <td style="padding:0.3rem 0.5rem;color:var(--muted);font-size:0.78rem">${wf}</td>
      </tr>`;
    }
    t += '</tbody></table>';
    return t;
  };

  html += renderTable(project, `Project (${project.length})`);
  html += renderTable(user, `User (${user.length})`);
  html += renderTable(builtin, `Built-in (${builtin.length})`);

  html += '<p style="margin-top:1rem;font-size:0.8rem;color:var(--muted)">'
        + '<code>ta agent list</code> — show profiles with full details · '
        + '<code>ta plugin list --agents</code> — show agent plugin summary'

  html += '</div>';
  setAppContent(html);
}

async function savePersona() {
  const name = (document.getElementById('persona-name') || {}).value || '';
  const description = (document.getElementById('persona-desc') || {}).value || '';
  const system_prompt = (document.getElementById('persona-prompt') || {}).value || '';
  const allowedRaw = (document.getElementById('persona-allowed') || {}).value || '';
  const forbiddenRaw = (document.getElementById('persona-forbidden') || {}).value || '';
  const status = document.getElementById('persona-status');

  if (!name.trim()) { if (status) { status.textContent = 'Name is required.'; status.style.color = 'var(--red)'; } return; }

  const allowed_tools = allowedRaw.split(',').map(s => s.trim()).filter(Boolean);
  const forbidden_tools = forbiddenRaw.split(',').map(s => s.trim()).filter(Boolean);

  try {
    const resp = await fetch('/api/persona/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim(), description, system_prompt, allowed_tools, forbidden_tools, output_format: 'markdown' })
    });
    const result = await resp.json();
    if (result.ok) {
      if (status) { status.textContent = 'Persona saved to ' + result.path; status.style.color = 'var(--green)'; }
      setTimeout(() => loadPersonas(), 1200);
    } else {
      if (status) { status.textContent = 'Error: ' + (result.error || 'Unknown'); status.style.color = 'var(--red)'; }
    }
  } catch (e) {
    if (status) { status.textContent = 'Network error: ' + e.message; status.style.color = 'var(--red)'; }
  }
}

async function runReleasePipeline() {
  const version = (document.getElementById('rel-version') || {}).value.trim();
  if (!version) { setReleaseStatus('Version is required.', 'var(--red)'); return; }
  const label = (document.getElementById('rel-label') || {}).value.trim();
  const fromTag = (document.getElementById('rel-from-tag') || {}).value.trim();
  const prerelease = !!(document.getElementById('rel-prerelease') || {}).checked;
  const dryRun = !!(document.getElementById('rel-dry-run') || {}).checked;

  let cmd = `ta release run ${version}`;
  if (label) cmd += ` --label ${label}`;
  if (fromTag) cmd += ` --from-tag ${fromTag}`;
  if (prerelease) cmd += ' --prerelease';
  if (dryRun) cmd += ' --dry-run';

  setReleaseStatus(`Starting release pipeline for v${version}…`, 'var(--accent)');
  showReleaseGatesSection(true);

  try {
    const resp = await fetch('/api/cmd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: cmd })
    });
    const result = await resp.json().catch(() => ({}));
    if (result.ok || result.started || result.queued) {
      setReleaseStatus(
        `Pipeline started for v${version}. Monitor approval gates below and in Agent Questions.`,
        'var(--green)'
      );
    } else {
      setReleaseStatus('Error: ' + (result.error || result.message || 'Pipeline failed to start.'), 'var(--red)');
    }
  } catch (e) {
    setReleaseStatus('Network error: ' + e.message, 'var(--red)');
  }
}

async function showReleasePipeline() {
  const fromTag = (document.getElementById('rel-from-tag') || {}).value.trim();
  let cmd = 'ta release show';
  if (fromTag) cmd += ` --from-tag ${fromTag}`;
  setReleaseStatus('Fetching pipeline…', 'var(--accent)');
  try {
    const resp = await fetch('/api/cmd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: cmd })
    });
    const result = await resp.json().catch(() => ({}));
    const output = result.output || result.stdout || '';
    setReleaseStatus('<pre style="white-space:pre-wrap;margin:0">' + esc(output) + '</pre>', 'inherit', true);
  } catch (e) {
    setReleaseStatus('Network error: ' + e.message, 'var(--red)');
  }
}

async function validateRelease() {
  const version = (document.getElementById('rel-version') || {}).value.trim();
  if (!version) { setReleaseStatus('Version is required.', 'var(--red)'); return; }
  setReleaseStatus('Validating…', 'var(--accent)');
  try {
    const resp = await fetch('/api/cmd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: `ta release validate ${version}` })
    });
    const result = await resp.json().catch(() => ({}));
    const output = result.output || result.stdout || result.message || '';
    setReleaseStatus('<pre style="white-space:pre-wrap;margin:0">' + esc(output) + '</pre>', 'inherit', true);
  } catch (e) {
    setReleaseStatus('Network error: ' + e.message, 'var(--red)');
  }
}

function setReleaseStatus(msg, color, isHtml) {
  const el = document.getElementById('rel-status');
  if (!el) return;
  el.style.display = 'block';
  el.style.color = color || 'inherit';
  if (isHtml) el.innerHTML = msg; else el.textContent = msg;
}

function showReleaseGatesSection(show) {
  const s = document.getElementById('rel-gates-section');
  if (s) s.style.display = show ? '' : 'none';
}

async function loadReleaseNotes() {
  const el = document.getElementById('rel-notes');
  if (!el) return;
  try {
    const resp = await fetch('/api/cmd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: 'cat .release-draft.md 2>/dev/null || echo "(no .release-draft.md found)"' })
    });
    const result = await resp.json().catch(() => ({}));
    const output = result.output || result.stdout || '(unavailable)';
    el.innerHTML = '<pre style="white-space:pre-wrap;margin:0;font-size:0.82rem">' + esc(output) + '</pre>';
  } catch (e) {
    el.textContent = 'Error: ' + e.message;
  }
}

async function loadReleaseHistory() {
  const card = document.getElementById('rel-history-card');
  if (!card) return;
  try {
    const resp = await fetch('/api/cmd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: 'cat .ta/release-history.json 2>/dev/null || echo "[]"' })
    });
    const result = await resp.json().catch(() => ({}));
    const raw = result.output || result.stdout || '[]';
    let history = [];
    try { history = JSON.parse(raw.trim()); } catch (_) { }
    if (!Array.isArray(history) || history.length === 0) {
      card.innerHTML = '<div class="card-meta">No release history yet.</div>';
      return;
    }
    const rows = history.slice().reverse().slice(0, 10).map(r => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid var(--border)">
        <span style="font-weight:600">${esc(r.tag || r.version)}</span>
        <span style="font-family:monospace;font-size:0.78rem;color:var(--muted)">${esc((r.commit||'').slice(0,7))}</span>
        <span style="font-size:0.8rem;color:var(--muted)">${esc(r.released_at||'')}</span>
      </div>`).join('');
    card.innerHTML = `<div style="font-size:0.85rem">${rows}</div>`;
  } catch (e) {
    card.innerHTML = '<div class="card-meta">Error loading history.</div>';
  }
}

// Poll for release approval gates (same queue as agent questions, goal_id = "release").
function startReleaseGatesPoller() {
  if (releaseApprovalPoller) clearInterval(releaseApprovalPoller);
  releaseApprovalPoller = setInterval(pollReleaseGates, 3000);
}

async function pollReleaseGates() {
  if (currentTab !== 'activity:release') {
    clearInterval(releaseApprovalPoller);
    releaseApprovalPoller = null;
    return;
  }
  try {
    const resp = await fetch('/api/interactions/pending');
    const all = resp.ok ? await resp.json().catch(() => []) : [];
    const gates = (all || []).filter(q => q.goal_id === 'release');
    renderReleaseGates(gates);
    showReleaseGatesSection(gates.length > 0);
  } catch (_) {}
}

function renderReleaseGates(gates) {
  const card = document.getElementById('rel-gates-card');
  if (!card) return;
  if (gates.length === 0) {
    card.innerHTML = '<div class="card-meta">No pending approval gates.</div>';
    return;
  }
  card.innerHTML = gates.map((g, i) => `
    <div class="card" style="margin-bottom:0.75rem;border-color:var(--yellow)" id="rg-${esc(g.interaction_id||i)}">
      <div class="card-header">
        <span class="card-title" style="font-size:0.95rem">${esc(g.question || g.prompt || 'Approval required')}</span>
        <span class="badge badge-question">Waiting</span>
      </div>
      ${g.context ? `<div style="margin-top:0.4rem;font-size:0.85rem;color:var(--muted)">${esc(g.context)}</div>` : ''}
      <div class="actions" style="margin-top:0.75rem">
        <button class="btn btn-approve btn-sm" onclick="respondReleaseGate('${esc(g.interaction_id||'')}',${i},'y')">Approve</button>
        <button class="btn btn-deny btn-sm" onclick="respondReleaseGate('${esc(g.interaction_id||'')}',${i},'n')">Abort</button>
      </div>
    </div>
  `).join('');
}

async function respondReleaseGate(id, idx, answer) {
  try {
    await fetch('/api/interactions/' + encodeURIComponent(id) + '/respond', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ response: answer })
    });
    const card = document.getElementById('rg-' + id);
    if (card) {
      card.style.opacity = '0.5';
      card.innerHTML += `<div style="color:${answer==='y'?'var(--green)':'var(--red)'};margin-top:0.5rem;font-size:0.85rem">${answer==='y'?'Approved.':'Aborted.'}</div>`;
    }
  } catch (e) {
    setReleaseStatus('Gate response error: ' + e.message, 'var(--red)');
  }
}

// ── Health Signals (v0.15.30.6) ───────────────────────────────
// Polls /health/signals every 30s and renders an ambient alert bar.
// Dismissed warn signals are suppressed for 1h (sessionStorage).
// Crit signals cannot be dismissed.

let _healthSignals = [];
let _healthCleanupLog = '';

function _dismissedKey(kind) { return 'health_dismissed_' + kind; }
function _isDismissed(kind) {
  const v = sessionStorage.getItem(_dismissedKey(kind));
  if (!v) return false;
  return Date.now() < parseInt(v, 10);
}
function _dismiss(kind) {
  sessionStorage.setItem(_dismissedKey(kind), String(Date.now() + 3600000));
  renderHealthBar();
}

async function pollHealthSignals() {
  try {
    const r = await fetch('/health/signals');
    if (!r.ok) return;
    const data = await r.json();
    _healthSignals = data.signals || [];
    renderHealthBar();
    // Update the Health tab badge if there are crit/warn signals.
    const tabEl = document.getElementById('tab-health');
    if (tabEl) {
      const urgent = _healthSignals.filter(s => s.severity === 'warn' || s.severity === 'crit').length;
      tabEl.textContent = urgent > 0 ? `Health (${urgent})` : 'Health';
    }
    if (currentTab === 'activity:health') renderHealthPageContent();
  } catch (_) {}
}

function renderHealthBar() {
  const container = document.getElementById('health-alert-container');
  if (!container) return;
  const visible = _healthSignals.filter(s =>
    (s.severity === 'warn' || s.severity === 'crit') && !_isDismissed(s.kind)
  );
  if (visible.length === 0) { container.innerHTML = ''; return; }
  // Show only the highest-severity signal in the bar.
  const top = visible[0];
  const isCrit = top.severity === 'crit';
  const dismissBtn = isCrit ? '' :
    `<span class="hb-dismiss" title="Dismiss for 1h" onclick="_dismiss('${esc(top.kind)}')">✕</span>`;
  const moreCount = visible.length - 1;
  const moreHint = moreCount > 0
    ? `<span class="health-bar-expand" onclick="switchTab('health')"> +${moreCount} more</span>`
    : '';
  container.innerHTML = `<div class="health-bar ${esc(top.severity)}">
    <span class="hb-msg">${esc(top.message)}</span>
    <span class="hb-action">${esc(top.action)}</span>
    ${moreHint}
    ${dismissBtn}
  </div>`;
}

async function runCleanup() {
  const logEl = document.getElementById('health-cleanup-log');
  const btnEl = document.getElementById('health-cleanup-btn');
  if (btnEl) btnEl.disabled = true;
  if (logEl) { logEl.style.display = 'block'; logEl.textContent = 'Running ta doctor --fix --yes ...\n'; }
  try {
    const r = await fetch('/api/cmd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: 'ta doctor --fix --yes' })
    });
    const text = await r.text();
    if (logEl) logEl.textContent += text + '\nDone.';
    await pollHealthSignals();
  } catch (e) {
    if (logEl) logEl.textContent += 'Error: ' + e.message;
  } finally {
    if (btnEl) btnEl.disabled = false;
  }
}

function renderHealthPageContent() {
  const app = document.getElementById('app');
  if (currentTab !== 'activity:health') return;
  const signals = _healthSignals;
  if (signals.length === 0) {
    setAppContent(`<div class="card"><div class="card-header"><span class="card-title">System Health</span></div>
      <p style="color:var(--green);margin-top:0.75rem">All systems healthy — no issues detected.</p>
      <button class="btn btn-ghost btn-sm" style="margin-top:0.75rem" onclick="pollHealthSignals()">Refresh</button>
    </div>`);
    return;
  }
  const rows = signals.map(s => `<div class="health-bar ${esc(s.severity)}" style="margin-bottom:0.4rem">
    <span class="hb-msg"><strong>[${esc(s.severity)}]</strong> ${esc(s.message)}</span>
    <span class="hb-action">${esc(s.action)}</span>
  </div>`).join('');
  setAppContent(`<div class="card">
    <div class="card-header">
      <span class="card-title">System Health</span>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="pollHealthSignals()">Refresh</button>
        <button class="health-cleanup-btn" id="health-cleanup-btn" onclick="runCleanup()">Run cleanup</button>
      </div>
    </div>
    <p style="color:var(--muted);font-size:0.8rem;margin:0.5rem 0">
      ${signals.length} signal(s) detected. Run cleanup to fix automatically.
    </p>
    <div style="margin-top:0.75rem">${rows}</div>
    <div id="health-cleanup-log" class="health-log" style="display:none"></div>
  </div>`);
}

async function loadHealthPage() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">Checking system health...</div>';
  await pollHealthSignals();
  renderHealthPageContent();
}

// Start polling health signals every 30s.
setInterval(pollHealthSignals, 30000);

// ── Version display (v0.16.1.2) ───────────────────────────────
async function loadVersion() {
  try {
    const r = await fetch('/health');
    if (!r.ok) return;
    const data = await r.json();
    const badge = document.getElementById('version-badge');
    if (badge && data.version) {
      badge.textContent = 'v' + data.version;
      badge.title = 'Version v' + data.version + ' — click to open Plan tab';
    }
  } catch(_) {}
}

// ── Linked Projects modal (v0.16.1.5) ────────────────────────
function showLinkModal(lnk) {
  const overlay = document.getElementById('link-modal-overlay');
  const body = document.getElementById('link-modal-body');
  const statusLabel = lnk.status === 'ok' ? (lnk.cached ? '~ cached' : '✓ manifest found') : lnk.status === 'missing_manifest' ? '✗ manifest missing' : '— unreachable';
  const location = lnk.path || lnk.repo || '';
  body.innerHTML = `
    <div style="margin-bottom:1rem">
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem">
        <strong style="font-size:1rem">${esc(lnk.name)}</strong>
        <span class="link-rel-badge">${esc(lnk.relationship)}</span>
        <span style="font-size:0.75rem;color:var(--muted)">${esc(statusLabel)}</span>
      </div>
      ${lnk.description ? `<p style="font-size:0.85rem;color:var(--muted);margin:0">${esc(lnk.description)}</p>` : ''}
      ${location ? `<p style="font-size:0.75rem;color:var(--muted);margin:0.3rem 0 0;font-family:monospace">${esc(location)}</p>` : ''}
    </div>
    ${lnk.manifest ? `<pre>${esc(lnk.manifest)}</pre>` : `<p style="color:var(--muted);font-size:0.85rem">No manifest available. Run <code>ta manifest init</code> in the linked project to create one.</p>`}
  `;
  overlay.style.display = 'flex';
}
function closeLinkModal(e) {
  if (!e || e.target === document.getElementById('link-modal-overlay') || !e.target) {
    document.getElementById('link-modal-overlay').style.display = 'none';
  }
}

// ── Boot ──────────────────────────────────────────────────────
// Attention is the landing destination (v0.17.0.12.17 item 1) — "what needs
// me right now" beats a stats dashboard as the first thing a user sees.
switchTab('attention');
checkWizard();
pollHealthSignals();
loadVersion();
pollNotifications();
startDashRefresh();
startDashEventStream();
setInterval(loadVersion, 60000);
