# Neovim Plugin — Lint and publish to GitHub Releases + LuaRocks.
#
# Triggered on:
#   - Pull requests touching plugins/nvim-ta/ (lint only)
#   - Tags matching `nvim-v*` (package + publish to GitHub Releases)
#   - Workflow dispatch for manual re-publish
#
# Required secrets for LuaRocks publish:
#   LUAROCKS_API_KEY — API key from https://luarocks.org/settings/api-keys

name: Neovim Plugin

on:
  push:
    tags:
      - 'nvim-v*'
  pull_request:
    paths:
      - 'plugins/nvim-ta/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. nvim-v0.16.6)'
        required: false

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install luacheck
        run: sudo apt-get install -y luarocks && sudo luarocks install luacheck

      - name: Lint Lua sources
        working-directory: plugins/nvim-ta
        run: |
          luacheck lua/ plugin/ \
            --globals vim \
            --no-unused-args \
            --max-line-length 120

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      version: ${{ steps.version.outputs.version }}
      tarball: ${{ steps.pack.outputs.tarball }}
    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#nvim-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Packaging nvim-ta v${VERSION}"

      - name: Create tarball
        id: pack
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL="nvim-ta-${VERSION}.tar.gz"

          # Create a clean archive of just the plugin directory
          tar czf "${TARBALL}" \
            --transform "s|^plugins/nvim-ta|nvim-ta-${VERSION}|" \
            --exclude="*.luac" \
            plugins/nvim-ta/

          shasum -a 256 "${TARBALL}" | awk '{print $1}' > "${TARBALL}.sha256"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nvim-ta-tarball
          path: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.tarball }}.sha256
          retention-days: 14

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/nvim-v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: nvim-ta-tarball

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nvim-v${{ needs.package.outputs.version }}
          name: nvim-ta v${{ needs.package.outputs.version }}
          body: |
            ## nvim-ta v${{ needs.package.outputs.version }}

            Neovim plugin for [Trusted Autonomy](https://github.com/trustedautonomy/ta).

            ### Install with lazy.nvim
            ```lua
            { "trustedautonomy/ta", subdir = "plugins/nvim-ta", tag = "nvim-v${{ needs.package.outputs.version }}" }
            ```

            ### Install from tarball
            Download `nvim-ta-${{ needs.package.outputs.version }}.tar.gz`, extract to your Neovim runtime path.

            ### Install via LuaRocks
            ```
            luarocks install nvim-ta
            ```

            Requires: Neovim 0.9+, curl, ta daemon >= 0.16.6
          files: |
            nvim-ta-${{ needs.package.outputs.version }}.tar.gz
            nvim-ta-${{ needs.package.outputs.version }}.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install luarocks
        run: sudo apt-get install -y luarocks

      - name: Update rockspec version
        working-directory: plugins/nvim-ta
        run: |
          VERSION="${{ needs.package.outputs.version }}"
          # Create a versioned rockspec alongside the scm one
          cp nvim-ta-scm-1.rockspec "nvim-ta-${VERSION}-1.rockspec"
          sed -i "s/version = \"scm-1\"/version = \"${VERSION}-1\"/" "nvim-ta-${VERSION}-1.rockspec"
          sed -i "s|url = \"git+https://github.com/trustedautonomy/ta\"|url = \"https://github.com/trustedautonomy/ta/releases/download/nvim-v${VERSION}/nvim-ta-${VERSION}.tar.gz\"|" "nvim-ta-${VERSION}-1.rockspec"
          sed -i '/subdir/d' "nvim-ta-${VERSION}-1.rockspec"

      - name: Publish to LuaRocks
        if: env.LUAROCKS_API_KEY != ''
        working-directory: plugins/nvim-ta
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: |
          VERSION="${{ needs.package.outputs.version }}"
          luarocks upload "nvim-ta-${VERSION}-1.rockspec" --api-key="${LUAROCKS_API_KEY}"
