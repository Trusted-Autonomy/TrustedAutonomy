# JetBrains Plugin — Build, verify, and publish to JetBrains Marketplace.
#
# Triggered on:
#   - Pull requests touching plugins/jetbrains-ta/ (build + verify only)
#   - Tags matching `jetbrains-v*` (full sign + publish)
#   - Workflow dispatch for manual publish (e.g., re-trigger after a failed publish)
#
# Required secrets (set at repository level):
#   JETBRAINS_MARKETPLACE_TOKEN — plugin upload token from https://plugins.jetbrains.com/author/me/tokens
#   JETBRAINS_CERTIFICATE_CHAIN — PEM certificate chain for plugin signing
#   JETBRAINS_PRIVATE_KEY       — PEM private key for plugin signing
#   JETBRAINS_PRIVATE_KEY_PASSWORD — passphrase for the private key (may be empty)

name: JetBrains Plugin

on:
  push:
    tags:
      - 'jetbrains-v*'
    paths:
      - 'plugins/jetbrains-ta/**'
  pull_request:
    paths:
      - 'plugins/jetbrains-ta/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. jetbrains-v0.16.1)'
        required: false

permissions:
  contents: write  # needed to upload release assets

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/jetbrains-ta

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.7"

      - name: Build plugin
        run: gradle buildPlugin

      - name: Verify plugin
        run: gradle verifyPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: jetbrains-ta-plugin
          path: plugins/jetbrains-ta/build/distributions/*.zip
          retention-days: 30

  publish:
    name: Sign & Publish to Marketplace
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/jetbrains-v') || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: plugins/jetbrains-ta

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.7"

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#jetbrains-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version ${VERSION}"

      - name: Update plugin version
        run: |
          sed -i "s/^pluginVersion=.*/pluginVersion=${{ steps.version.outputs.version }}/" gradle.properties

      - name: Sign plugin
        run: gradle signPlugin
        env:
          JETBRAINS_CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          JETBRAINS_PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          JETBRAINS_PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}

      - name: Publish to JetBrains Marketplace
        run: gradle publishPlugin
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          JETBRAINS_CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          JETBRAINS_PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          JETBRAINS_PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}

      - name: Upload signed plugin to GitHub release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/jetbrains-v')
        with:
          files: plugins/jetbrains-ta/build/distributions/signed-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
