name: Nightly Build

on:
  schedule:
    # 10:00 UTC = 2:00 AM Pacific Time (PT)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build even if no new commits since last nightly'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ta
  # Per-run dated tags (nightly-YYYYMMDD-<shortsha>), never reused --
  # immutable-releases-compatible by design. History: a single stable tag
  # ("nightly", then "nightly-latest", then "nightly-build") got permanently
  # locked by GitHub's Immutable Releases feature (GA for all repos since
  # 2025-10-28: publishing/un-drafting a release makes it immutable
  # unconditionally -- confirmed via GitHub's docs and community discussions,
  # not a toggleable-away-the-symptom fix since the toggle itself is a real
  # supply-chain protection, not something to disable). Never marked --latest
  # (that slot must stay pointed at real stable releases); browse nightlies
  # via the GitHub-native releases search instead of a fixed tag/URL — see
  # README.md / docs/USAGE.md.
  NIGHTLY_HISTORY_LIMIT: 60

jobs:
  check-for-changes:
    name: Check for new commits since last nightly
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      head_sha: ${{ steps.check.outputs.head_sha }}
      head_sha_short: ${{ steps.check.outputs.head_sha_short }}
      trigger_type: ${{ steps.check.outputs.trigger_type }}
      nightly_tag: ${{ steps.check.outputs.nightly_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check commit SHA against last nightly
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          HEAD_SHA_SHORT=$(git rev-parse --short HEAD)
          echo "head_sha=${HEAD_SHA}" >> $GITHUB_OUTPUT
          echo "head_sha_short=${HEAD_SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "nightly_tag=nightly-$(date -u +%Y%m%d)-${HEAD_SHA_SHORT}" >> $GITHUB_OUTPUT

          # Determine trigger type for history table
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "trigger_type=manual" >> $GITHUB_OUTPUT
          else
            echo "trigger_type=scheduled" >> $GITHUB_OUTPUT
          fi

          # Force flag bypasses the SHA check
          if [ "$FORCE" = "true" ]; then
            echo "Force flag set — proceeding unconditionally."
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find the most recent nightly-* release (dated tags, never reused --
          # there is no single "the nightly release" to look up by fixed name
          # anymore) and check its last-sha.txt asset against HEAD.
          LATEST_NIGHTLY_TAG=$(gh release list --limit 200 --json tagName,createdAt \
            --jq '[.[] | select(.tagName | startswith("nightly-"))] | sort_by(.createdAt) | last | .tagName' 2>/dev/null || true)

          LAST_SHA=""
          if [ -n "$LATEST_NIGHTLY_TAG" ]; then
            LAST_SHA=$(gh release download "$LATEST_NIGHTLY_TAG" --pattern "last-sha.txt" --output - 2>/dev/null | tr -d '[:space:]') || true
          fi

          if [ -z "$LAST_SHA" ]; then
            echo "No previous nightly found — proceeding with first nightly build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [ "$LAST_SHA" = "$HEAD_SHA" ]; then
            echo "Skipping — no commits since last nightly (SHA: ${HEAD_SHA})."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New commits detected since last nightly (${LAST_SHA} → ${HEAD_SHA})."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build-nightly:
    name: Build ${{ matrix.target }}
    needs: check-for-changes
    if: needs.check-for-changes.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add target to pinned toolchain (native builds)
        # rust-toolchain.toml pins an exact channel (e.g. "1.97.0") with no
        # host triple, which rustup resolves to its own toolchain separate
        # from "stable" above. Once this repo's rust-toolchain.toml override
        # kicks in for `cargo build`, it uses whatever targets *that*
        # toolchain has — not the "stable" one dtolnay/rust-toolchain just
        # configured. Add the target directly to the active (overridden)
        # toolchain so cross-arch native builds (e.g. x86_64-apple-darwin on
        # an arm64 runner) don't fail with "can't find crate for `core`".
        if: matrix.cross == false
        run: rustup target add ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.cross == true
        run: cargo install cross --version 0.2.5

      - name: Build binary (native)
        if: matrix.cross == false
        run: |
          cargo build --release --target ${{ matrix.target }} -p ta-cli
          cargo build --release --target ${{ matrix.target }} -p ta-daemon
          cargo build --release --target ${{ matrix.target }} -p ta-agent-ollama

      - name: Build binary (cross)
        if: matrix.cross == true
        run: |
          cross build --release --target ${{ matrix.target }} -p ta-cli
          cross build --release --target ${{ matrix.target }} -p ta-daemon
          cross build --release --target ${{ matrix.target }} -p ta-agent-ollama

      - name: Package binary with docs (Unix)
        if: runner.os != 'Windows'
        env:
          HEAD_SHA: ${{ needs.check-for-changes.outputs.head_sha }}
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} staging/
          cp target/${{ matrix.target }}/release/ta-daemon staging/
          cp target/${{ matrix.target }}/release/ta-agent-ollama staging/ 2>/dev/null || true
          # Stamp the nightly SHA into USAGE.md before packaging
          if [ -f docs/USAGE.md ]; then
            sed "s/^\*\*Version\*\*:.*/**Version**: nightly-${HEAD_SHA:0:7}/" \
              docs/USAGE.md > staging/USAGE.md
          fi
          # Generate USAGE.html
          if command -v pandoc >/dev/null 2>&1; then
            pandoc staging/USAGE.md --standalone --embed-resources \
              --metadata title="Trusted Autonomy Usage Guide" \
              -o staging/USAGE.html
          else
            printf '<!DOCTYPE html><html><meta charset="utf-8"><title>Trusted Autonomy Usage Guide</title><body><pre>%s</pre></body></html>' \
              "$(cat staging/USAGE.md)" > staging/USAGE.html
          fi
          cp DISCLAIMER.md staging/ 2>/dev/null || true
          cp LICENSE staging/ 2>/dev/null || true
          mkdir -p staging/plugins/vcs
          if [ -f plugins/vcs-perforce ]; then
            cp plugins/vcs-perforce staging/plugins/vcs/
            chmod +x staging/plugins/vcs/vcs-perforce
          fi
          if [ -f plugins/vcs-perforce.toml ]; then
            cp plugins/vcs-perforce.toml staging/plugins/vcs/
          fi
          mkdir -p artifacts
          cd staging
          tar czf ../artifacts/${{ env.BINARY_NAME }}-nightly-${{ matrix.target }}.tar.gz *

      - name: Install pandoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install pandoc -y --no-progress | Out-Null
          $env:PATH = [System.Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path', 'User')
          pandoc --version | Select-Object -First 1

      - name: Package binary with docs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          HEAD_SHA: ${{ needs.check-for-changes.outputs.head_sha }}
        run: |
          $env:PATH = [System.Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path', 'User')
          $ShortSha = "$env:HEAD_SHA".Substring(0, [Math]::Min(7, "$env:HEAD_SHA".Length))
          New-Item -ItemType Directory -Force -Path staging, artifacts | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" staging/
          Copy-Item "target/${{ matrix.target }}/release/ta-daemon.exe" staging/
          if (Test-Path "target/${{ matrix.target }}/release/ta-agent-ollama.exe") {
            Copy-Item "target/${{ matrix.target }}/release/ta-agent-ollama.exe" staging/
          }
          if (Test-Path "docs/USAGE.md") {
            (Get-Content "docs/USAGE.md") -replace '^\*\*Version\*\*:.*', "**Version**: nightly-${ShortSha}" |
              Set-Content "staging/USAGE.md"
          }
          pandoc "staging\USAGE.md" --standalone --embed-resources `
            --metadata title="Trusted Autonomy Usage Guide" `
            -o "staging\USAGE.html"
          foreach ($f in @("DISCLAIMER.md", "LICENSE")) {
            if (Test-Path $f) { Copy-Item $f staging/ }
          }
          Compress-Archive -Path staging/* -DestinationPath "artifacts/${{ env.BINARY_NAME }}-nightly-${{ matrix.target }}.zip"

      - name: Build Windows MSI
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        env:
          HEAD_SHA: ${{ needs.check-for-changes.outputs.head_sha }}
        run: |
          dotnet tool install --global wix --version "4.0.6"
          wix extension add WixToolset.UI.wixext/4.0.6
          $ShortSha = "$env:HEAD_SHA".Substring(0, [Math]::Min(7, "$env:HEAD_SHA".Length))
          # Use a fixed semver for MSI since nightly doesn't have a version tag.
          # Read from Cargo.toml to get current version digits.
          $cargoVersion = (Select-String -Path "Cargo.toml" -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1).Matches.Groups[1].Value
          $vm = [regex]::Match($cargoVersion, '(\d+)\.(\d+)\.(\d+)')
          $major = [int]$vm.Groups[1].Value
          $minor = [int]$vm.Groups[2].Value
          $patch = [int]$vm.Groups[3].Value
          $subPatch = 0
          $sm = [regex]::Match($cargoVersion, '\.(\d+)$')
          if ($sm.Success) { $subPatch = [int]$sm.Groups[1].Value }
          $msiPatch = $patch * 100 + $subPatch
          $msiVersion = "${major}.${minor}.${msiPatch}.0"
          Write-Host "MSI version: $msiVersion (nightly SHA: $ShortSha)"

          $env:PATH = [System.Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path', 'User')
          $releaseDir = "target\x86_64-pc-windows-msvc\release"
          $stampedMd = "staging-usage.md"
          (Get-Content "docs\USAGE.md") -replace '^\*\*Version\*\*:.*', "**Version**: nightly-${ShortSha}" |
            Set-Content $stampedMd -Encoding utf8
          pandoc $stampedMd --standalone --embed-resources `
            --metadata title="Trusted Autonomy Usage Guide" `
            -o "$releaseDir\USAGE.html"
          if (Test-Path "scripts\ta-studio.bat") {
            Copy-Item "scripts\ta-studio.bat" "$releaseDir\ta-studio.bat"
          }
          New-Item -ItemType Directory -Force -Path "$releaseDir\plugins\vcs" | Out-Null
          if (Test-Path "plugins\vcs-perforce") {
            Copy-Item "plugins\vcs-perforce" "$releaseDir\plugins\vcs\vcs-perforce"
          }
          if (Test-Path "plugins\vcs-perforce.toml") {
            Copy-Item "plugins\vcs-perforce.toml" "$releaseDir\plugins\vcs\vcs-perforce.toml"
          }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          wix build apps/ta-cli/wix/main.wxs `
            -ext WixToolset.UI.wixext `
            -d SourceDir="$releaseDir" `
            -d Version="$msiVersion" `
            -d Platform=x64 `
            -arch x64 `
            -o "artifacts\${{ env.BINARY_NAME }}-nightly-x86_64-pc-windows-msvc.msi"
          Write-Host "MSI created: artifacts\ta-nightly-x86_64-pc-windows-msvc.msi"

      - name: Generate SHA256 checksums (Unix)
        if: runner.os != 'Windows'
        run: |
          cd artifacts
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > SHA256SUMS-${{ matrix.target }}.txt
          else
            shasum -a 256 * > SHA256SUMS-${{ matrix.target }}.txt
          fi

      - name: Generate SHA256 checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd artifacts
          $files = @(Get-ChildItem -Filter "*.zip") + @(Get-ChildItem -Filter "*.msi")
          if ($files.Count -eq 0) {
            Write-Warning "No zip/msi files found in artifacts — skipping checksum"
          } else {
            Get-FileHash $files -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)"
            } | Out-File -Encoding ascii "SHA256SUMS-${{ matrix.target }}.txt"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nightly-${{ matrix.target }}
          path: artifacts/

  nightly-gate:
    name: Nightly Gate (all platforms must pass)
    needs: [check-for-changes, build-nightly]
    if: needs.check-for-changes.outputs.should_build == 'true' && always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all builds succeeded
        run: |
          if [ "${{ needs.build-nightly.result }}" != "success" ]; then
            echo "One or more platform builds failed. Blocking nightly publish."
            echo "Build result: ${{ needs.build-nightly.result }}"
            exit 1
          fi
          echo "All platform builds passed. Proceeding to publish nightly."

  publish-nightly:
    name: Publish Nightly Release
    needs: [check-for-changes, nightly-gate]
    if: needs.check-for-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: |
          cd artifacts
          cat SHA256SUMS-*.txt > SHA256SUMS.txt
          rm -f SHA256SUMS-*.txt

      - name: Write last-sha.txt
        env:
          HEAD_SHA: ${{ needs.check-for-changes.outputs.head_sha }}
        run: echo -n "${HEAD_SHA}" > artifacts/last-sha.txt

      - name: Build nightly release body
        id: build_body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ needs.check-for-changes.outputs.head_sha }}
          HEAD_SHA_SHORT: ${{ needs.check-for-changes.outputs.head_sha_short }}
          TRIGGER_TYPE: ${{ needs.check-for-changes.outputs.trigger_type }}
          NIGHTLY_TAG: ${{ needs.check-for-changes.outputs.nightly_tag }}
          REPO: ${{ github.repository }}
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%d")
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Asset URL base for this nightly release
          ASSET_BASE="https://github.com/${REPO}/releases/download/${NIGHTLY_TAG}"

          # Determine what's new since the last stable (non-prerelease) release.
          LAST_STABLE_TAG=$(gh release list --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          WHATS_NEW=""
          if [ -n "${LAST_STABLE_TAG}" ]; then
            WHATS_NEW=$(git log "${LAST_STABLE_TAG}..HEAD" --oneline --no-merges 2>/dev/null | head -30 || true)
          fi

          # Recent nightly history, built directly from real past releases --
          # each dated-tag release is a permanent object now (never reused/
          # edited), so there's no need to hand-maintain a growing table
          # inside one body string across runs the way the old single-tag
          # design did. The release being created *this* run doesn't exist
          # yet when this step runs, so prepend it manually.
          THIS_ROW="| ${BUILD_DATE} | [${NIGHTLY_TAG}](https://github.com/${REPO}/releases/tag/${NIGHTLY_TAG}) |"
          PAST_ROWS=$(gh release list --limit 200 --json tagName,createdAt \
            --jq --arg repo "${REPO}" '
              [.[] | select(.tagName | startswith("nightly-"))]
              | sort_by(.createdAt) | reverse | .[0:14]
              | .[] | "| \(.createdAt[0:10]) | [\(.tagName)](https://github.com/\($repo)/releases/tag/\(.tagName)) |"
            ' 2>/dev/null || true)
          HISTORY_ROWS="$(printf '%s\n%s' "${THIS_ROW}" "${PAST_ROWS}")"

          # Build the full release body (avoid heredoc — unindented content breaks YAML block scalars)
          {
            printf '## Nightly Build -- %s\n\n' "${BUILD_DATE}"
            printf '**Commit**: [%s](https://github.com/%s/commit/%s)\n' "${HEAD_SHA_SHORT}" "${REPO}" "${HEAD_SHA}"
            printf '**Built**: %s (%s)\n' "${BUILD_TIMESTAMP}" "${TRIGGER_TYPE}"
            printf '**Branch**: main\n\n'
            printf '> This is an automated nightly pre-release built from the latest commit on `main`.\n'
            printf '> Each night gets its own permanent release (tags are never reused, so this\n'
            printf '> page will always be here) -- browse all nightlies on the\n'
            printf '> [nightly releases page](https://github.com/%s/releases?q=nightly&expanded=true),\n' "${REPO}"
            printf '> or see the [latest stable release](https://github.com/%s/releases/latest) instead.\n\n' "${REPO}"
            printf '### Download\n\n'
            printf '| Platform | Archive | Installer |\n'
            printf '|----------|---------|------------|\n'
            printf '| Linux x86_64 | [tar.gz](%s/ta-nightly-x86_64-unknown-linux-musl.tar.gz) | -- |\n' "${ASSET_BASE}"
            printf '| Linux ARM64 | [tar.gz](%s/ta-nightly-aarch64-unknown-linux-musl.tar.gz) | -- |\n' "${ASSET_BASE}"
            printf '| macOS Intel | [tar.gz](%s/ta-nightly-x86_64-apple-darwin.tar.gz) | -- |\n' "${ASSET_BASE}"
            printf '| macOS ARM (M1/M2) | [tar.gz](%s/ta-nightly-aarch64-apple-darwin.tar.gz) | -- |\n' "${ASSET_BASE}"
            printf '| Windows x86_64 | [zip](%s/ta-nightly-x86_64-pc-windows-msvc.zip) | [msi](%s/ta-nightly-x86_64-pc-windows-msvc.msi) |\n\n' "${ASSET_BASE}" "${ASSET_BASE}"
            printf '[SHA256SUMS.txt](%s/SHA256SUMS.txt)\n\n' "${ASSET_BASE}"
            if [ -n "${WHATS_NEW}" ]; then
              printf '%s\n\n' '---'
              printf '### Changes since %s\n\n' "${LAST_STABLE_TAG}"
              printf '```\n'
              printf '%s\n' "${WHATS_NEW}"
              printf '```\n\n'
            fi
            printf '%s\n\n' '---'
            printf '## Recent Nightly Builds {#nightly-history}\n\n'
            printf '| Date | Release |\n'
            printf '|------|--------|\n'
            printf '%s\n' "${HISTORY_ROWS}"
          } > nightly-body.md

          echo "body_file=nightly-body.md" >> $GITHUB_OUTPUT

      - name: Validate artifacts before publish
        run: |
          REQUIRED=(
            "ta-nightly-aarch64-apple-darwin.tar.gz"
            "ta-nightly-x86_64-apple-darwin.tar.gz"
            "ta-nightly-x86_64-unknown-linux-musl.tar.gz"
            "ta-nightly-aarch64-unknown-linux-musl.tar.gz"
            "ta-nightly-x86_64-pc-windows-msvc.zip"
            "ta-nightly-x86_64-pc-windows-msvc.msi"
            "SHA256SUMS.txt"
            "last-sha.txt"
          )
          MISSING=()
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "artifacts/$f" ]; then
              MISSING+=("$f")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: Missing nightly artifacts:"
            for m in "${MISSING[@]}"; do echo "  - $m"; done
            exit 1
          fi
          echo "All ${#REQUIRED[@]} required nightly artifacts present."

      - name: Create nightly GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA_SHORT: ${{ needs.check-for-changes.outputs.head_sha_short }}
          NIGHTLY_TAG: ${{ needs.check-for-changes.outputs.nightly_tag }}
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%d")
          RELEASE_TITLE="Nightly ${BUILD_DATE} (${HEAD_SHA_SHORT})"

          # Every run creates a brand-new release under a never-reused dated
          # tag (nightly-YYYYMMDD-<shortsha>) -- nothing is ever edited or
          # re-uploaded to an existing release, so GitHub's Immutable Releases
          # feature (unconditional GA for all repos since 2025-10-28: any
          # published release becomes immutable, confirmed not a toggleable
          # per-repo setting worth disabling since it's a real supply-chain
          # protection) simply never applies. No draft/undraft dance needed --
          # `gh release create` with assets attached publishes immediately.
          #
          # --latest=false is deliberate: nightlies must never claim the
          # repo's single "latest release" slot, which needs to stay pointed
          # at the actual latest stable release for `/releases/latest` and
          # `/releases/latest/download/...` to work correctly for users who
          # want stable, not nightly, builds.
          echo "Creating nightly release ${NIGHTLY_TAG}..."
          gh release create "$NIGHTLY_TAG" \
            --title "$RELEASE_TITLE" \
            --notes-file nightly-body.md \
            --prerelease \
            --latest=false \
            artifacts/*

          echo ""
          echo "Nightly release published:"
          echo "  Title: ${RELEASE_TITLE}"
          echo "  SHA: ${{ needs.check-for-changes.outputs.head_sha }}"
          echo "  URL: https://github.com/${{ github.repository }}/releases/tag/${NIGHTLY_TAG}"

      - name: Clean up old nightly releases (retention)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Dated tags accumulate one new release per run forever unless
          # pruned. Deletion (unlike editing/re-uploading assets) still works
          # fine on immutable releases -- only in-place mutation is blocked --
          # so this keeps working regardless of the immutable-releases toggle.
          OLD_TAGS=$(gh release list --limit 500 --json tagName,createdAt \
            --jq --argjson limit "${NIGHTLY_HISTORY_LIMIT}" '
              [.[] | select(.tagName | startswith("nightly-"))]
              | sort_by(.createdAt) | reverse | .[$limit:] | .[].tagName
            ' 2>/dev/null || true)

          if [ -n "$OLD_TAGS" ]; then
            echo "Deleting nightly releases beyond the retention limit (${NIGHTLY_HISTORY_LIMIT}):"
            echo "$OLD_TAGS" | while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              echo "  - $tag"
              gh release delete "$tag" --yes --cleanup-tag || echo "    (failed to delete $tag, continuing)"
            done
          else
            echo "No old nightly releases to clean up (retention limit: ${NIGHTLY_HISTORY_LIMIT})."
          fi
